ht:900}.team-content{min-width:0}.team-head{grid-template-columns:minmax(0,1fr) auto;padding-bottom:8px}.team-body{padding-bottom:18px}.team-score b{font-size:34px}.team-score span{font-size:13px}.team-stats{grid-template-columns:1.2fr 1fr 1fr 1fr}.tier-badge{height:30px;border-radius:12px}.section-title.rank-title{align-items:center}.section-title.rank-title h2{font-size:20px}@media (max-width:860px){.summary{grid-template-columns:1fr 1fr}.metric.primary{grid-column:1/3}.rank-podium{grid-template-columns:1fr}.team-card{grid-template-columns:76px minmax(0,1fr)}.rank-num{width:50px;height:50px;border-radius:17px;font-size:18px}.team-stats{grid-template-columns:repeat(2,1fr)}.team-score{align-items:flex-start;flex-direction:column}.team-score b{font-size:31px}}

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRdfZpx6LSayA7SRgyWlR51RJfbOHaSJm_E514PwCKE2sQvKPzJDfS3tGDxZeRPtEYH2_1GvrvVfH5o/pub?gid=0&single=true&output=csv';
const MEMBER_CSV_URL='https://docs.google.com/spreadsheets/d/1pwoa_QvPUiAzhcu0ZsYQfV3Zb7rxiLdbP4v7JZ6yVV4/gviz/tq?tqx=out:csv&gid=1874206095';
const START_TIME='202607090900';
const END_TIME='202607130900';
const $=id=>document.getElementById(id);
const fmt=n=>Number(n||0).toLocaleString('ko-KR');
const norm=s=>(s||'').toString().normalize('NFKC').replace(/\s/g,'').toLowerCase();
const parseNumber=v=>Number((v||'0').toString().replace(/[^0-9.-]/g,''))||0;
const esc=s=>(s||'').toString().replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
const state={history:[],members:new Map(),teams:[],sort:'rate',query:''};

function parseCSV(text){
  const rows=[];let row=[],cur='',quote=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i],next=text[i+1];
    if(ch==='"'){ if(quote&&next==='"'){cur+='"';i++;} else quote=!quote; }
    else if(ch===','&&!quote){ row.push(cur); cur=''; }
    else if((ch==='\n'||ch==='\r')&&!quote){ if(ch==='\r'&&next==='\n') i++; row.push(cur); if(row.some(v=>v!=='')) rows.push(row); row=[]; cur=''; }
    else cur+=ch;
  }
  if(cur||row.length){ row.push(cur); if(row.some(v=>v!=='')) rows.push(row); }
  return rows;
}
function findColumn(headers,names){return headers.findIndex(h=>names.some(n=>norm(h)===norm(n)||norm(h).includes(norm(n))));}
function shortTime(raw){return raw&&raw.length>=12?raw.slice(4,6)+'.'+raw.slice(6,8)+' '+raw.slice(8,10)+':'+raw.slice(10,12):'기준값';}
function memberName(m){return typeof m==='string'?m:(m?.name||'');}
function memberBranch(m){return typeof m==='string'?'':(m?.branch||'');}

function tierFor(rate){
  if(rate>=18) return {key:'tier18', label:'18% 달성', perMember:10};
  if(rate>=15) return {key:'tier15', label:'15% 달성', perMember:7};
  if(rate>=12) return {key:'tier12', label:'12% 달성', perMember:5};
  return {key:'', label:'진행중', perMember:0};
}
function snapshot(timeRaw){
  const byTeam=new Map();
  state.history.filter(r=>r.timeRaw&&r.timeRaw<=timeRaw).sort((a,b)=>a.timeRaw.localeCompare(b.timeRaw)).forEach(r=>byTeam.set(norm(r.team),r));
  return byTeam;
}
function memberCount(team){
  const item=state.members.get(norm(team.team));
  if(item&&item.members.length) return item.members.length;
  return 0;
}
function buildTeams(){
  const latestTime=state.history.map(r=>r.timeRaw).filter(t=>t&&t<=END_TIME).sort().at(-1)||'';
  const base=snapshot(START_TIME);
  const current=snapshot(latestTime||END_TIME);
  const keys=new Set([...base.keys(),...current.keys()]);
  state.teams=[...keys].map(key=>{
    const cur=current.get(key)||base.get(key);
    const start=base.get(key)||cur;
    const members=state.members.get(key);
    const count=memberCount(cur);
    const delta=Math.max(Number(cur?.result||0)-Number(start?.result||0),0);
    const target=Number(cur?.target||start?.target||0);
    const eventRate=target?delta/target*100:0;
    const tier=tierFor(eventRate);
    return {
      team:cur?.team||start?.team||members?.team||'',
      leader:members?.leader||'',
      target,
      baseResult:Number(start?.result||0),
      result:Number(cur?.result||0),
      delta,
      eventRate,
      memberCount:count,
      tier,
      reward:count*tier.perMember,
      timeRaw:latestTime
    };
  }).filter(t=>t.team);
  $('basisText').textContent=(latestTime?shortTime(latestTime):'데이터 없음')+' 기준';
}
function render(){
  buildTeams();
  const sorted=[...state.teams].sort((a,b)=>b.eventRate-a.eventRate||b.delta-a.delta||a.team.localeCompare(b.team,'ko'));
  let prevRate=null,prevDelta=null,prevRank=0;
  let ranked=sorted.map((t,i)=>{
    const sameAsPrev=i>0&&Math.abs(t.eventRate-prevRate)<0.0001&&t.delta===prevDelta;
    const rank=sameAsPrev?prevRank:i+1;
    prevRate=t.eventRate; prevDelta=t.delta; prevRank=rank;
    return {...t,rank};
  });
  const rankCounts=ranked.reduce((map,t)=>map.set(t.rank,(map.get(t.rank)||0)+1),new Map());
  ranked=ranked.map(t=>({...t,tied:(rankCounts.get(t.rank)||0)>1}));
  const rankMap=new Map(ranked.map(t=>[norm(t.team),t.rank]));
  const q=norm(state.query);
  let list=ranked.filter(t=>!q||norm(t.team).includes(q)||norm(t.leader).includes(q));
  if(state.sort==='rate') list.sort((a,b)=>a.rank-b.rank);
  if(state.sort==='reward') list.sort((a,b)=>b.reward-a.reward||a.rank-b.rank);
  if(state.sort==='delta') list.sort((a,b)=>b.delta-a.delta||a.rank-b.rank);
  if(state.sort==='team') list.sort((a,b)=>a.team.localeCompare(b.team,'ko'));
  list=list.map(t=>({...t,rank:rankMap.get(norm(t.team))||t.rank}));
  const totals=state.teams.reduce((acc,t)=>{acc.target+=t.target;acc.delta+=t.delta;acc.achieved+=t.eventRate>=12?1:0;acc.reward+=t.reward;return acc;},{target:0,delta:0,achieved:0,reward:0});
  const overall=totals.target?totals.delta/totals.target*100:0;
  $('overallRate').textContent=overall.toFixed(1);
  $('overallBar').style.width=Math.min(overall,100)+'%';
  $('overallNote').textContent='추가 실적 '+fmt(totals.delta)+'천원 / 목표 '+fmt(totals.target)+'천원';
  $('achievedTeams').textContent=fmt(totals.achieved);
  $('totalReward').textContent=fmt(totals.reward);
  $('listCount').textContent=fmt(list.length)+'팀';
  $('empty').style.display=list.length?'none':'block';
  const podium=$('rankPodium');
  if(podium){
    podium.innerHTML=ranked.slice(0,3).map((t,i)=>`<article class="podium-card ${i===0?'top1':''}"><div class="podium-rank">${t.tied?`공동 ${t.rank}등`:`${t.rank}등`}</div><div class="podium-team">${esc(t.team)}</div><div class="podium-rate">${t.eventRate.toFixed(1)}%</div><div class="podium-meta">추가 ${fmt(t.delta)}천원 · 예상 ${fmt(t.reward)}만원</div></article>`).join('');
  }
  $('teamList').innerHTML=list.map(teamCard).join('');
}
function teamCard(t){
  const width=Math.min(t.eventRate/18*100,100);
  const remain12=Math.max(Math.ceil(t.target*.12-t.delta),0);
  const remain15=Math.max(Math.ceil(t.target*.15-t.delta),0);
  const remain18=Math.max(Math.ceil(t.target*.18-t.delta),0);
  return `<article class="team-card">
    <div class="rank-block"><div class="rank-num">${t.tied?`공동 ${t.rank}등`:`${t.rank}등`}</div><div class="rank-label">현재 순위</div></div>
    <div class="team-content">
      <div class="team-head">
        <div><div class="team-title">${esc(t.team)}</div><div class="team-meta">${t.leader?`팀장 ${esc(t.leader)} · `:''}팀원 ${fmt(t.memberCount)}명</div></div>
        <span class="tier-badge ${t.tier.key}">${t.tier.label}</span>
      </div>
      <div class="team-body">
        <div class="team-score"><b>${t.eventRate.toFixed(1)}%</b><span>추가 ${fmt(t.delta)}천원 · 예상 ${fmt(t.reward)}만원</span></div>
        <div class="team-progress"><span style="width:${width}%"></span></div>
        <div class="team-stats">
          <div class="stat"><span>추가 실적</span><b>${fmt(t.delta)}천원</b></div>
          <div class="stat"><span>12%까지</span><b>${remain12?fmt(remain12)+'천원':'달성'}</b></div>
          <div class="stat"><span>15%까지</span><b>${remain15?fmt(remain15)+'천원':'달성'}</b></div>
          <div class="stat"><span>18%까지</span><b>${remain18?fmt(remain18)+'천원':'달성'}</b></div>
        </div>
      </div>
    </div>
  </article>`;
}
function applyRows(rows){
  const headers=rows[0].map(v=>(v||'').trim());
  const teamIndex=findColumn(headers,['팀명','팀','team']);
  const targetIndex=findColumn(headers,['목표','target']);
  const resultIndex=findColumn(headers,['실적','result']);
  const timeIndex=findColumn(headers,['시간','업데이트','기준','time']);
  state.history=rows.slice(1).map(r=>({
    team:(r[teamIndex]||'').trim(),
    target:parseNumber(r[targetIndex]),
    result:parseNumber(r[resultIndex]),
    timeRaw:(r[timeIndex>=0?timeIndex:3]||'').toString().replace(/\D/g,'')
  })).filter(r=>r.team);
}
function applyMemberRows(rows){
  const headers=rows[0].map(v=>(v||'').trim());
  const teamIndex=findColumn(headers,['팀명','팀','team']);
  const nameIndex=findColumn(headers,['이름','팀원','name','member']);
  const branchIndex=findColumn(headers,['지점','소속','branch']);
  const traitIndex=findColumn(headers,['특성','팀원특성','구분','trait','role']);
  const map=new Map();
  rows.slice(1).forEach(r=>{
    const team=(r[teamIndex]||'').trim(),name=(r[nameIndex]||'').trim();
    if(!team||!name) return;
    const key=norm(team);
    if(!map.has(key)) map.set(key,{team,members:[],leader:''});
    const item=map.get(key);
    const trait=traitIndex>=0?(r[traitIndex]||'').trim():'';
    if(trait&&norm(trait).includes('팀장')) item.leader=name;
    if(!item.members.some(m=>norm(memberName(m))===norm(name))) item.members.push({name,branch:branchIndex>=0?(r[branchIndex]||'').trim():''});
  });
  state.members=map;
}
async function load(){
  $('basisText').textContent='데이터 불러오는 중';
  const data=await fetch(CSV_URL+'&cacheBust='+Date.now()).then(r=>r.text());
  applyRows(parseCSV(data));
  try{
    const members=await fetch(MEMBER_CSV_URL+'&cacheBust='+Date.now()).then(r=>r.text());
    applyMemberRows(parseCSV(members));
  }catch(e){ console.warn('member load failed',e); }
  render();
}
$('q').addEventListener('input',e=>{state.query=e.target.value;render();});
$('sort').addEventListener('change',e=>{state.sort=e.target.value;render();});
$('refreshBtn').addEventListener('click',load);
load().catch(err=>{console.error(err);$('basisText').textContent='데이터 연결 실패';});
</script>
</body>
</html>
