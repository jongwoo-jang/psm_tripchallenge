<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7월 특화마케팅팀 핵심프로젝트</title>
  <style>
    :root {
      --bg:#07111f;
      --surface:rgba(255,255,255,.10);
      --surface2:rgba(255,255,255,.16);
      --line:rgba(255,255,255,.18);
      --text:#f8fafc;
      --muted:#bfd0e6;
      --navy:#0f172a;
      --primary:#7c3aed;
      --cyan:#22d3ee;
      --pink:#f472b6;
      --amber:#fbbf24;
      --white:#ffffff;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:Pretendard,'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(34,211,238,.34), transparent 28%),
        radial-gradient(circle at 86% 4%, rgba(244,114,182,.35), transparent 26%),
        radial-gradient(circle at 76% 82%, rgba(124,58,237,.35), transparent 30%),
        linear-gradient(135deg,#020617 0%,#111827 48%,#172554 100%);
      overflow-x:hidden;
    }
    body:before{
      content:"";
      position:fixed;inset:0;pointer-events:none;opacity:.55;
      background-image:
        linear-gradient(rgba(255,255,255,.055) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.055) 1px,transparent 1px);
      background-size:44px 44px;
      mask-image:linear-gradient(to bottom,#000,transparent 78%);
    }
    .orb{position:fixed;border-radius:50%;filter:blur(22px);opacity:.65;pointer-events:none;animation:float 8s ease-in-out infinite alternate}
    .orb.one{width:260px;height:260px;background:#22d3ee;left:-70px;top:120px}
    .orb.two{width:330px;height:330px;background:#7c3aed;right:-110px;top:290px;animation-delay:-2s}
    @keyframes float{to{transform:translateY(26px) translateX(18px) scale(1.05)}}
    .container{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:48px 22px 80px}
    .hero{
      display:grid;grid-template-columns:minmax(0,1.2fr) 430px;gap:28px;align-items:stretch;margin-bottom:22px;
    }
    .heroCard,.sideCard,.panel,.card{
      border:1px solid var(--line);
      background:linear-gradient(145deg,rgba(255,255,255,.15),rgba(255,255,255,.07));
      box-shadow:0 24px 90px rgba(0,0,0,.28);
      backdrop-filter:blur(18px);
    }
    .heroCard{border-radius:36px;padding:38px;position:relative;overflow:hidden}
    .heroCard:after{content:"";position:absolute;right:-80px;top:-90px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.22),transparent 68%)}
    .eyebrow{display:inline-flex;gap:8px;align-items:center;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid var(--line);font-weight:900;color:#e0f2fe}
    h1{margin:24px 0 12px;font-size:clamp(44px,7vw,86px);line-height:.98;letter-spacing:-.075em}
    .highlight{background:linear-gradient(90deg,#67e8f9,#c4b5fd,#f9a8d4);-webkit-background-clip:text;background-clip:text;color:transparent}
    .subtitle{font-size:18px;line-height:1.75;color:var(--muted);max-width:820px;margin:0}
    .sideCard{border-radius:36px;padding:26px;display:flex;flex-direction:column;gap:14px;justify-content:center}
    .metric{border-radius:26px;padding:22px;background:rgba(2,6,23,.28);border:1px solid rgba(255,255,255,.14)}
    .metric strong{display:block;font-size:46px;letter-spacing:-.06em}
    .metric span{color:var(--muted);font-weight:800}
    .leaderHint{margin-top:4px;padding:18px;border-radius:24px;background:linear-gradient(135deg,rgba(251,191,36,.18),rgba(244,114,182,.12));border:1px solid rgba(251,191,36,.28);color:#fef3c7;font-weight:800;line-height:1.55}
    .panel{border-radius:30px;padding:18px;margin-bottom:24px}
    .toolbar{display:grid;grid-template-columns:1fr 170px 150px;gap:12px;align-items:center}
    .searchBox{height:56px;display:flex;align-items:center;gap:10px;border-radius:20px;padding:0 16px;background:rgba(15,23,42,.48);border:1px solid rgba(255,255,255,.18)}
    .searchBox input{width:100%;height:100%;border:0;outline:0;background:transparent;color:var(--text);font-size:16px;font-weight:800}
    .searchBox input::placeholder{color:#94a3b8}
    button{height:56px;border:0;border-radius:20px;padding:0 18px;cursor:pointer;color:#07111f;font-weight:950;font-size:15px;background:linear-gradient(135deg,#67e8f9,#c4b5fd);box-shadow:0 14px 30px rgba(34,211,238,.18)}
    button.ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18);box-shadow:none}
    .result{margin-top:12px;color:var(--muted);font-weight:800}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .card{position:relative;overflow:hidden;border-radius:28px;padding:22px;cursor:pointer;transition:transform .22s ease, border-color .22s ease, background .22s ease}
    .card:hover{transform:translateY(-7px);border-color:rgba(103,232,249,.55);background:linear-gradient(145deg,rgba(255,255,255,.20),rgba(255,255,255,.09))}
    .card:before{content:"";position:absolute;inset:0 0 auto;height:4px;background:linear-gradient(90deg,var(--cyan),var(--primary),var(--pink))}
    .cardTop{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .team{font-size:21px;font-weight:1000;letter-spacing:-.05em;line-height:1.25}
    .num{min-width:50px;height:50px;border-radius:18px;display:grid;place-items:center;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.16);font-weight:1000;color:#dbeafe}
    .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);font-size:12px;font-weight:900;color:#e2e8f0}
    .leaderChip{background:linear-gradient(135deg,rgba(251,191,36,.26),rgba(244,114,182,.20));border-color:rgba(251,191,36,.36);color:#fff7ed}
    .people{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px}
    .badge{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.14);font-size:13px;color:#f8fafc;font-weight:800}
    .badge.leader{background:rgba(251,191,36,.22);border-color:rgba(251,191,36,.40);color:#fef3c7}
    .empty{display:none;text-align:center;padding:60px 20px;color:#cbd5e1;border:1px dashed var(--line);border-radius:28px;background:rgba(255,255,255,.06)}
    .modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(2,6,23,.76);backdrop-filter:blur(10px)}
    .box{position:relative;max-width:820px;width:100%;max-height:88vh;overflow:auto;border-radius:34px;background:#fff;color:#0f172a;padding:34px;box-shadow:0 40px 120px rgba(0,0,0,.48)}
    .box:before{content:"";position:absolute;inset:0 0 auto;height:10px;background:linear-gradient(90deg,var(--cyan),var(--primary),var(--pink),var(--amber))}
    .close{position:absolute;right:20px;top:18px;width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#f1f5f9;font-size:28px;cursor:pointer;color:#334155}
    .modalTitle{margin:16px 54px 8px 0;font-size:38px;letter-spacing:-.06em;line-height:1.15}
    .modalSub{color:#64748b;font-weight:900;margin-bottom:12px}
    .leaderBox{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;margin:18px 0;border-radius:22px;background:linear-gradient(135deg,#fff7ed,#fef3c7);border:1px solid #fde68a;color:#78350f;font-weight:1000}
    .leaderBox small{display:block;font-size:12px;color:#92400e;margin-bottom:2px}
    .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:12px}
    .member{position:relative;padding:15px 12px;text-align:center;border-radius:18px;background:linear-gradient(135deg,#eef2ff,#ecfeff);font-weight:950;color:#1e293b;border:1px solid #e2e8f0}
    .member.leader{background:linear-gradient(135deg,#fef3c7,#fce7f3);border-color:#facc15;color:#713f12}
    .member.leader:after{content:"팀장";position:absolute;right:8px;top:7px;font-size:10px;padding:3px 6px;border-radius:999px;background:#f59e0b;color:white}
    .navBtns{display:flex;gap:10px;margin-top:24px}
    .navBtns button{flex:1;color:#07111f}
    .navBtns .ghost{color:#111827;background:#f1f5f9;border:1px solid #e2e8f0}
    @media(max-width:860px){.hero{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.sideCard{display:grid;grid-template-columns:repeat(2,1fr)}.leaderHint{grid-column:1/-1}}
    @media(max-width:560px){.container{padding:28px 14px 60px}.heroCard{padding:26px 20px;border-radius:28px}.sideCard{grid-template-columns:1fr}.metric strong{font-size:38px}.modalTitle{font-size:30px}.box{padding:28px 18px}}
  </style>
</head>
<body>
  <div class="orb one"></div><div class="orb two"></div>
  <main class="container">
    <section class="hero">
      <div class="heroCard">
        <div class="eyebrow">✨ PSM · Special Marketing Team</div>
        <h1>7월 특화마케팅팀<br><span class="highlight">핵심프로젝트</span></h1>
        <p class="subtitle">38개 팀의 구성과 팀장을 한눈에 확인하는 인터랙티브 팀 보드입니다. 팀명, 지점, 팀원 이름으로 검색하고 카드 클릭으로 상세 명단을 확인하세요.</p>
      </div>
      <aside class="sideCard">
        <div class="metric"><strong id="teamTotal">38</strong><span>참여 팀</span></div>
        <div class="metric"><strong id="memberTotal">189</strong><span>참여 인원</span></div>
        <div class="leaderHint">🏅 각 조의 첫 번째 인원을 <b>팀장</b>으로 별도 표기했습니다.</div>
      </aside>
    </section>

    <section class="panel">
      <div class="toolbar">
        <label class="searchBox"><span>🔎</span><input id="search" placeholder="팀명 · 지점 · 팀원 이름으로 검색" autocomplete="off"></label>
        <button onclick="randomTeam()">랜덤 팀 보기</button>
        <button class="ghost" onclick="resetSearch()">전체 보기</button>
      </div>
      <div class="result" id="resultText"></div>
    </section>

    <section class="grid" id="grid"></section>
    <section class="empty" id="empty">검색 결과가 없습니다. 다른 팀명, 지점 또는 이름으로 찾아보세요.</section>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="box">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 class="modalTitle" id="mt"></h2>
      <div class="modalSub" id="ms"></div>
      <div id="mc"></div>
      <div class="navBtns"><button class="ghost" onclick="moveTeam(-1)">이전 팀</button><button onclick="moveTeam(1)">다음 팀</button></div>
    </div>
  </div>

    teamTotal.textContent=teams.length;

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    function render(arr=teams){
      grid.innerHTML='';
      empty.style.display=arr.length?'none':'block';
      resultText.textContent=`현재 ${arr.length}개 팀 / ${arr.reduce((s,t)=>s+t.members.length,0)}명 표시 중`;
      arr.forEach((t)=>{
        const i=teams.indexOf(t);
        const c=document.createElement('article');
        c.className='card';
        const preview=t.members.slice(0,7).map((m,idx)=>`<span class="badge ${idx===0?'leader':''}">${idx===0?'🏅 ':''}${escapeHtml(m)}</span>`).join('');
        c.innerHTML=`
          <div class="cardTop">
            <div>
              <div class="team">${escapeHtml(t.team)}</div>
              <div class="meta">
                <span class="chip">📍 ${escapeHtml(t.branch||'지점 미지정')}</span>
                <span class="chip leaderChip">🏅 팀장 ${escapeHtml(t.leader)}</span>
                <span class="chip">👥 ${t.members.length}명</span>
              </div>
            </div>
            <div class="num">${String(i+1).padStart(2,'0')}</div>
          </div>
          <div class="people">${preview}${t.members.length>7?'<span class="badge">외 '+(t.members.length-7)+'명</span>':''}</div>`;
        c.onclick=()=>show(i);
        grid.appendChild(c);
      });
    }

    function show(i){
      currentIndex=(i+teams.length)%teams.length;
      const t=teams[currentIndex];
      mt.textContent=t.team;
      ms.textContent=`${String(currentIndex+1).padStart(2,'0')}번째 팀 · ${t.branch||'지점 미지정'} · 팀원 ${t.members.length}명`;
      mc.innerHTML=`
        <div class="leaderBox">
          <div><small>TEAM LEADER</small><div>🏅 ${escapeHtml(t.leader)}</div></div>
          <div>${escapeHtml(t.team)}</div>
        </div>
        <div class="list">
          ${t.members.map((m,idx)=>`<div class="member ${idx===0?'leader':''}">${escapeHtml(m)}</div>`).join('')}
        </div>`;
      modal.style.display='flex';
    }

    function closeModal(){modal.style.display='none'}
    function moveTeam(dir){show(currentIndex+dir)}
    function randomTeam(){show(Math.floor(Math.random()*teams.length))}
    function resetSearch(){search.value='';render(teams);search.focus()}

    search.addEventListener('input',e=>{
      const q=e.target.value.trim().toLowerCase();
      const filtered=teams.filter(t=>
        t.team.toLowerCase().includes(q) ||
        (t.branch||'').toLowerCase().includes(q) ||
        t.members.some(m=>m.toLowerCase().includes(q))
      );
      render(filtered);
    });

    modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});
    window.addEventListener('keydown',e=>{
      if(modal.style.display==='flex'){
        if(e.key==='Escape')closeModal();
        if(e.key==='ArrowLeft')moveTeam(-1);
        if(e.key==='ArrowRight')moveTeam(1);
      }
    });
    render();
