const fmt = n => Number(n || 0).toLocaleString('ko-KR');
const norm = s => (s || '').toString().normalize('NFKC').replace(/\s/g, '').toLowerCase();
const memberName = m => typeof m === 'string' ? m : (m?.name || '');
const memberBranch = m => typeof m === 'string' ? '' : (m?.branch || '');
const rate = t => t.target ? (t.result / t.target) * 100 : 0;
const remain = t => Math.max((t.target || 0) - (t.result || 0), 0);
const esc = s => (s || '').toString().replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
const parseNumber = v => Number((v || '0').toString().replace(/[^0-9.-]/g, '')) || 0;
const parseSheetTime = v => {
  const raw = (v || '').toString().replace(/\D/g, '');
  if(raw.length < 12) return '';
  const y = raw.slice(0, 4), m = raw.slice(4, 6), d = raw.slice(6, 8);
  const h = raw.slice(8, 10) === '10' ? '08' : raw.slice(8, 10);
  const min = raw.slice(10, 12);
  return `${y}.${m}.${d} ${h}:${min} 기준`;
};
const shortSheetTime = raw => {
  const s = (raw || '').toString().replace(/\D/g, '');
  if(s.length < 12) return '';
  const h = s.slice(8,10) === '10' ? '08' : s.slice(8,10);
  return `${s.slice(4,6)}.${s.slice(6,8)} ${h}:${s.slice(10,12)}`;
};
const prefersReducedMotion = () => matchMedia('(prefers-reduced-motion: reduce)').matches;

function setTheme(mode){
  const dark = mode === 'dark' || (!mode && matchMedia('(prefers-color-scheme: dark)').matches);
  document.body.classList.toggle('dark', dark);
  localStorage.setItem('psm-theme', dark ? 'dark' : 'light');
}

function setBasis(sourceText){
  const d = new Date().toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit' }).replace(/\.\s?/g,'.').replace(/\.$/,'');
  $('basisText').textContent = sourceText || d + ' 업데이트 08:00 / 18:00 기준';
}

function totals(list = state.teams){
  return list.reduce((acc, t) => {
    acc.target += Number(t.target || 0);
    acc.result += Number(t.result || 0);
    acc.members += Array.isArray(t.members) ? t.members.length : 0;
    return acc;
  }, { target:0, result:0, members:0 });
}

function setNumber(id, value, options = {}){
  const el = $(id);
  if(!el) return;
  const decimals = options.decimals || 0;
  const format = n => decimals ? Number(n).toFixed(decimals) : fmt(Math.round(n));
  if(prefersReducedMotion()){
    el.textContent = format(value);
    el.dataset.value = value;
    return;
  }
  const from = Number(el.dataset.value || el.textContent.replace(/[^0-9.-]/g, '') || 0);
  const to = Number(value || 0);
  el.dataset.value = to;
  const start = performance.now();
  const duration = options.duration || 520;
  function tick(now){
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = format(from + (to - from) * eased);
    if(p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function setupReveal(){
  const items = document.querySelectorAll('.hero-main,.metric,.rank-card,.trend-panel,.team-card');
  items.forEach(el => el.classList.add('reveal'));
  if(prefersReducedMotion() || !('IntersectionObserver' in window)){
    items.forEach(el => el.classList.add('is-visible'));
    return;
  }
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold:.12 });
  items.forEach(el => observer.observe(el));
}

function setupSectionSpy(){
  if(!('IntersectionObserver' in window)) return;
  const buttons = new Map([...document.querySelectorAll('[data-go]')].map(btn => [btn.dataset.go, btn]));
  const observer = new IntersectionObserver(entries => {
    const visible = entries.filter(e => e.isIntersecting).sort((a,b) => b.intersectionRatio - a.intersectionRatio)[0];
    if(!visible) return;
    document.querySelectorAll('[data-go]').forEach(btn => btn.classList.remove('active'));
    const btn = buttons.get(visible.target.id);
    if(btn) btn.classList.add('active');
  }, { rootMargin:'-35% 0px -50% 0px', threshold:[.1,.25,.5] });
  ['top','teams','search'].forEach(id => { const el = $(id); if(el) observer.observe(el); });
}

function arrangeProductFlow(){
  const toolbar = $('search');
  const top = $('top');
  if(toolbar && top && top.nextElementSibling !== toolbar) top.insertAdjacentElement('afterend', toolbar);
}

function setupMobileAppMode(){
  const apply = () => document.body.classList.toggle('mobile-app', innerWidth <= 720);
  apply();
  addEventListener('resize', apply, { passive:true });
  document.addEventListener('pointerdown', e => {
    const target = e.target.closest('button,.team-card,.rank-card');
    if(target) target.classList.add('touch-down');
  }, { passive:true });
  document.addEventListener('pointerup', () => {
    document.querySelectorAll('.touch-down').forEach(el => el.classList.remove('touch-down'));
  }, { passive:true });
  document.addEventListener('pointercancel', () => {
    document.querySelectorAll('.touch-down').forEach(el => el.classList.remove('touch-down'));
  }, { passive:true });
}

function sortedTeams(){
  const list = state.teams.map(t => ({ ...t, rate: rate(t), remain: remain(t) }));
  return list.sort((a,b) => {
    if(state.sort === 'result') return b.result - a.result || b.rate - a.rate;
    if(state.sort === 'remain') return a.remain - b.remain || b.rate - a.rate;
    if(state.sort === 'team') return a.team.localeCompare(b.team, 'ko');
    return b.rate - a.rate || b.result - a.result || a.team.localeCompare(b.team, 'ko');
  });
}

function filteredTeams(rankMap){
  const q = norm($('q').value);
  let list = sortedTeams().filter(t => !q || norm(t.team).includes(q) || norm(t.leader).includes(q) || t.members.some(m => norm(memberName(m)).includes(q) || norm(memberBranch(m)).includes(q)));
  if(state.filter === 'top10') list = list.filter(t => rankMap.get(t.team) <= 10);
  if(state.filter === 'watch') list = list.filter(t => t.rate < 10);
  if(state.filter === 'over55') list = list.filter(t => t.rate >= 55);
  if(state.filter === 'over60') list = list.filter(t => t.rate >= 60);
  if(state.filter === 'over65') list = list.filter(t => t.rate >= 65);
  if(state.filter === 'done') list = list.filter(t => t.rate >= 100);
  return list;
}

function render(){
  const ranked = [...state.teams].map(t => ({ ...t, rate: rate(t), remain: remain(t) })).sort((a,b) => b.rate - a.rate || b.result - a.result || a.team.localeCompare(b.team, 'ko'));
  const rankMap = new Map(ranked.map((t,i) => [t.team, i + 1]));
  const total = totals();
  const overall = total.target ? total.result / total.target * 100 : 0;
  setNumber('overallRate', overall, { decimals:1 });
  $('overallBar').style.width = Math.min(overall, 100) + '%';
  $('overallNote').textContent = fmt(total.result) + ' / ' + fmt(total.target) + '천원';
  setNumber('totalResult', total.result);
  $('totalTarget').textContent = '목표 ' + fmt(total.target) + '천원';
  setNumber('teamCount', state.teams.length);
  setNumber('memberCount', total.members);
  $('topTeamPill').textContent = ranked[0] ? '1위 ' + ranked[0].team + ' ' + ranked[0].rate.toFixed(1) + '%' : 'TOP 팀 없음';
  $('topList').innerHTML = ranked.slice(0,5).map((t,i) => rankCard(t, i)).join('');
  const teamParam = new URLSearchParams(location.search).get('team');
  const list = filteredTeams(rankMap);
  $('grid').innerHTML = list.map(t => teamCard(t, rankMap.get(t.team), teamParam && norm(teamParam) === norm(t.team))).join('');
  $('listCount').textContent = fmt(list.length) + '팀';
  updateActiveHint(list.length, state.teams.length);
  $('empty').style.display = list.length ? 'none' : 'block';
  renderTrend();
  setupReveal();
  requestAnimationFrame(() => document.querySelectorAll('[data-width]').forEach(el => { el.style.width = el.dataset.width + '%'; }));
}

function updateActiveHint(visible, total){
  const q = $('q').value.trim();
  const filterLabel = document.querySelector('.chip.active')?.textContent || '전체';
  const sortLabel = $('sort').selectedOptions[0]?.textContent || '달성률순';
  const searchText = q ? ` · 검색 "${q}"` : '';
  $('activeHint').textContent = `${filterLabel} ${fmt(visible)}팀 / 전체 ${fmt(total)}팀 · ${sortLabel}${searchText}`;
  $('clearSearch').classList.toggle('is-visible', Boolean(q));
}

function renderTrend(){
  const chart = $('trendChart');
  if(!chart) return;
  const source = state.history.length ? state.history : state.teams.map(t => ({ ...t, timeRaw: '' }));
  const grouped = new Map();
  source.forEach(t => {
    const key = t.timeRaw || 'baseline';
    if(!grouped.has(key)) grouped.set(key, { timeRaw:key, target:0, result:0 });
    const item = grouped.get(key);
    item.target += Number(t.target || 0);
    item.result += Number(t.result || 0);
  });
  const points = [...grouped.values()].sort((a,b) => a.timeRaw.localeCompare(b.timeRaw)).slice(-8);
  const max = Math.max(...points.map(p => p.result), 1);
  const latest = points[points.length - 1];
  const prev = points[points.length - 2];
  const delta = latest && prev ? latest.result - prev.result : 0;
  $('trendSummary').textContent = points.length > 1
    ? `최근 ${points.length}개 시점 · ${delta >= 0 ? '+' : ''}${fmt(delta)}천원`
    : '최근 업데이트 기준';
  if(chart.style.setProperty) chart.style.setProperty('--trend-count', points.length || 1);
  else chart.style['--trend-count'] = points.length || 1;
  chart.innerHTML = points.map((p, i) => {
    const h = Math.max((p.result / max) * 100, 4);
    const diff = i ? p.result - points[i - 1].result : 0;
    const diffClass = i ? (diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat') : 'start';
    const label = p.timeRaw === 'baseline' ? '기준값' : shortSheetTime(p.timeRaw);
    return `<div class="trend-item">
      <div class="trend-label">${label}</div>
      <div class="trend-bar-wrap"><div class="trend-bar ${i === points.length - 1 ? 'is-latest' : ''}" style="width:${h}%"></div></div>
      <div class="trend-value">${fmt(p.result)}</div>
      <div class="trend-delta ${diffClass}">${i ? (diff >= 0 ? '+' : '') + fmt(diff) : '-'}</div>
    </div>`;
  }).join('');
}

function rankCard(t, i){
  return `<button class="rank-card" type="button" onclick="focusTeam('${encodeURIComponent(t.team)}')">
    <div class="rank-top"><div class="rank-no">${i + 1}</div><div class="rank-rate">${t.rate.toFixed(1)}%</div></div>
    <div class="rank-team">${esc(t.team)}</div><div class="rank-meta">팀장 ${esc(t.leader)} · 실적 ${fmt(t.result)}천원</div>
  </button>`;
}

function teamCard(t, rank, highlight){
  const p = rate(t), capped = Math.min(p, 100), left = remain(t), members = t.members.filter(m => norm(memberName(m)) !== norm(t.leader));

  return `<article class="team-card ${highlight ? 'highlight' : ''}" id="team-${encodeURIComponent(t.team)}">
    <button class="team-summary" type="button" onclick="toggleTeam(this)" aria-expanded="false">
      <span class="team-main"><span class="team-title">${esc(t.team)}</span><span class="team-status ${status[0]}">${status[1]}</span></span>
      <span class="team-side"><span class="rank-badge">#${rank}</span><b>${p.toFixed(1)}%</b></span>
    </button>
    <div class="team-progress"><span style="width:${capped}%;background:${ringColor}"></span></div>
    <div class="team-detail">
      <div class="detail-grid">

        <div><span>실적</span><b>${fmt(t.result)}천원</b></div>
        <div><span>잔여</span><b>${left ? fmt(left) + '천원' : '완료'}</b></div>
      </div>
      <div class="team-actions"><button class="link-btn" type="button" onclick="shareTeam('${encodeURIComponent(t.team)}')">공유</button><button class="link-btn" type="button" onclick="toggleMembers(this)">팀원 ${members.length}명</button></div>
      <div class="members">${members.map(m => `<span class="member"><b>${esc(memberName(m))}</b>${memberBranch(m) ? `<small>${esc(memberBranch(m))}</small>` : ''}</span>`).join('')}</div>
    </div>
  </article>`;
}

function toggleMembers(btn){
  const box = btn.closest('.team-card').querySelector('.members');
  const open = box.classList.toggle('open');
  btn.textContent = open ? '접기' : '팀원 ' + box.children.length + '명';
}

function toggleTeam(btn){
  const card = btn.closest('.team-card');
  const open = card.classList.toggle('open');
  btn.setAttribute('aria-expanded', String(open));
}

function focusTeam(name){
  const el = $('team-' + name);
  if(el){ el.scrollIntoView({ behavior:'smooth', block:'center' }); el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 1800); }
}

async function shareTeam(name){
  const teamName = decodeURIComponent(name);
  const url = new URL(location.href);
  url.searchParams.set('team', teamName);
  try{
    await navigator.clipboard.writeText(url.toString());
    showNotice('팀 공유 링크를 복사했습니다.', 'ok');
  }catch(e){
    location.href = url.toString();
  }
}

function parseCSV(text){
  const rows = [];
  let row = [], cur = '', quote = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i], n = text[i + 1];
    if(c === '"'){
      if(quote && n === '"'){ cur += '"'; i++; }
      else quote = !quote;
    }else if(c === ',' && !quote){
      row.push(cur.trim());
      cur = '';
    }else if((c === '\n' || c === '\r') && !quote){
      if(c === '\r' && n === '\n') i++;
      row.push(cur.trim());
      cur = '';
      if(row.some(v => v !== '')) rows.push(row);
      row = [];
    }else{
      cur += c;
    }
  }
  row.push(cur.trim());
  if(row.some(v => v !== '')) rows.push(row);
  return rows;
}

function findColumn(headers, names){
  const normalized = headers.map(norm);
  return names.map(norm).reduce((found, name) => found >= 0 ? found : normalized.findIndex(h => h === name || h.includes(name)), -1);
}

function applyRows(rows){
  if(!rows || rows.length < 2) throw new Error('empty');
  const headers = rows[0].map(v => (v || '').trim());
  const teamIndex = findColumn(headers, ['팀명','팀','team']);
  const targetIndex = findColumn(headers, ['목표','target']);
  const resultIndex = findColumn(headers, ['실적','result']);
  const timeIndex = findColumn(headers, ['시간','업데이트','기준','time','updated']);
  if(teamIndex < 0 || targetIndex < 0 || resultIndex < 0) throw new Error('columns');
  const latestByTeam = new Map();
  const history = [];
  let sheetTimeRaw = '';
  rows.slice(1).forEach(r => {
    const name = (r[teamIndex] || '').trim();
    const timeRaw = (r[timeIndex >= 0 ? timeIndex : 3] || '').toString().replace(/\D/g, '');
    if(!name) return;
    const item = { team:name, target: parseNumber(r[targetIndex]), result: parseNumber(r[resultIndex]), timeRaw };
    history.push(item);
    const key = norm(name);
    const current = latestByTeam.get(key);
    if(!current || (timeRaw && timeRaw >= (current.timeRaw || ''))) latestByTeam.set(key, item);
    if(timeRaw && timeRaw > sheetTimeRaw) sheetTimeRaw = timeRaw;
  });
  if(!latestByTeam.size) throw new Error('no rows');
  state.history = history;
  state.teams = BASE_TEAMS.map(t => latestByTeam.has(norm(t.team)) ? { ...t, ...latestByTeam.get(norm(t.team)) } : { ...t });
  showNotice('', 'hide');
  setBasis(parseSheetTime(sheetTimeRaw));
  $('syncState').textContent = '구글 시트 최신 데이터 반영';
  render();
}

function applyMemberRows(rows){
  if(!rows || rows.length < 2) throw new Error('member empty');
  const headers = rows[0].map(v => (v || '').trim());
  const teamIndex = findColumn(headers, ['팀명','팀','team']);
  const nameIndex = findColumn(headers, ['이름','팀원','name','member']);
  const branchIndex = findColumn(headers, ['지점','소속지점','소속','branch','office']);
  const leaderIndex = findColumn(headers, ['팀장','leader']);
  if(teamIndex < 0 || nameIndex < 0) throw new Error('member columns');
  const map = new Map();
  rows.slice(1).forEach(r => {
    const team = (r[teamIndex] || '').trim();
    const name = (r[nameIndex] || '').trim();
    const branch = branchIndex >= 0 ? (r[branchIndex] || '').trim() : '';
    if(!team || !name) return;
    const key = norm(team);
    if(!map.has(key)) map.set(key, { members: [], leader: '' });
    const item = map.get(key);
    if(!item.members.some(m => norm(memberName(m)) === norm(name))) item.members.push({ name, branch });
    if(leaderIndex >= 0 && r[leaderIndex]) item.leader = r[leaderIndex].trim();
  });
  if(!map.size) throw new Error('member no rows');
  state.teams = state.teams.map(t => {
    const item = map.get(norm(t.team));
    if(!item) return t;
    return { ...t, members: item.members, leader: item.leader || t.leader || item.members[0] };
  });
}

function showNotice(text, mode){
  const n = $('notice');
  if(mode === 'hide' || !text){ n.style.display = 'none'; n.textContent = ''; return; }
  n.style.display = 'block'; n.textContent = text;
}

async function loadSheet(){
  if(state.loading) return;
  state.loading = true;
  $('refreshBtn').disabled = true;
  try{
    const res = await fetch(CSV_URL + '&cacheBust=' + Date.now());
    if(!res.ok) throw new Error('network');
    applyRows(parseCSV(await res.text()));
    try{
      const memberRes = await fetch(MEMBER_CSV_URL + '&cacheBust=' + Date.now());
      if(!memberRes.ok) throw new Error('member network');
      applyMemberRows(parseCSV(await memberRes.text()));
      render();
    }catch(memberError){
      console.warn('Member CSV load failed:', memberError);
    }
  }catch(e){
    console.warn('CSV load failed:', e);
    state.teams = structuredClone(BASE_TEAMS);
    state.history = [];
    setBasis();
    $('syncState').textContent = '기본 데이터 표시';
    showNotice('구글 시트 연결이 지연되어 기본 데이터를 표시하고 있습니다. 새로고침을 누르면 다시 확인합니다.', 'warn');
    render();
  }finally{
    state.loading = false;
    $('refreshBtn').disabled = false;
  }
}

document.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
  btn.classList.add('active'); state.filter = btn.dataset.filter; render();
}));
document.querySelectorAll('[data-go]').forEach(btn => btn.addEventListener('click', () => {
  $(btn.dataset.go).scrollIntoView({ behavior:'smooth', block:'start' });
  document.querySelectorAll('[data-go]').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
}));
$('q').addEventListener('input', render);
$('clearSearch').addEventListener('click', () => {
  $('q').value = '';
  $('q').focus();
  render();
});
$('q').addEventListener('keydown', e => {
  if(e.key === 'Escape' && $('q').value){
    $('q').value = '';
    render();
  }
});
$('sort').addEventListener('change', e => { state.sort = e.target.value; render(); });
$('refreshBtn').addEventListener('click', loadSheet);
$('themeBtn').addEventListener('click', () => setTheme(document.body.classList.contains('dark') ? 'light' : 'dark'));
setTheme(localStorage.getItem('psm-theme'));
setBasis(); setupMobileAppMode(); arrangeProductFlow(); render(); setupSectionSpy(); loadSheet();
setTimeout(() => { const p = new URLSearchParams(location.search).get('team'); if(p) focusTeam(encodeURIComponent(p)); }, 700);
</script>
