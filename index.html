/* Executive clean design override */
:root{

  --accent:#16745c;--warn:#9b6a15;--danger:#b4534b;

body{background:#f5f6f8;color:var(--text)}

.app{max-width:1060px}

.brand-title{font-size:14px;font-weight:760}.brand-sub{font-size:12px;color:var(--muted)}
.hero-main,.metric,.rank-card,.team-card,.trend-panel,.search,.sort-select,.icon-btn,.refresh-btn{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow-soft)}

.hero-main p{font-size:14px;line-height:1.65;color:var(--muted)}
.pill{background:#f6f8fb;border:1px solid var(--line);color:#536170;border-radius:999px;font-weight:650}
.metric{border-radius:16px}.metric.primary:before{height:2px;background:var(--brand-2)}
.metric-label svg{background:#f3f6fb;border:1px solid #e3e9f2;border-radius:8px;padding:3px}
.metric:nth-child(2) .metric-label:after,.metric:nth-child(3) .metric-label:after{display:none}
.metric-value{font-weight:760;color:#18212b}.metric-note{color:var(--muted)}
.toolbar{background:linear-gradient(180deg,rgba(245,246,248,.96) 78%,rgba(245,246,248,0));border-bottom:0}
.search:focus-within,.sort-select:focus{border-color:#9db6d8;box-shadow:0 0 0 3px rgba(49,95,155,.10)}

.rank-card{border-radius:15px}.rank-card:hover,.team-card:hover,.icon-btn:hover,.refresh-btn:hover{transform:none;box-shadow:var(--shadow)}

/* Readable trend table */
.trend-panel{padding:0;overflow:hidden}
.trend-chart{display:grid;grid-template-columns:1fr;gap:0;min-height:auto;padding:0;background:#fff}
.trend-item{display:grid;grid-template-columns:92px minmax(0,1fr) 104px 82px;align-items:center;gap:12px;min-height:52px;padding:10px 14px;border-bottom:1px solid var(--line)}
.trend-item:last-child{border-bottom:0}
.trend-bar-wrap{height:10px;border:0;background:var(--surface-3);border-radius:999px;overflow:hidden}
.trend-bar{height:100%!important;min-height:0;border-radius:999px;background:#8aa8cf}
.trend-bar.is-latest{background:var(--accent)}
.trend-value{position:static;transform:none;font-size:13px;font-weight:720;color:var(--text);text-align:right;white-space:nowrap}
.trend-value:after{content:"천원";margin-left:2px;color:var(--muted);font-size:11px;font-weight:620}
.trend-label{text-align:left;color:var(--text);font-size:12px;font-weight:680;white-space:nowrap}
.trend-delta{display:block;margin:0;text-align:right;font-size:12px;font-weight:680;color:var(--muted);white-space:nowrap}
.trend-delta:after{content:"천원";margin-left:2px;color:var(--muted);font-size:10px;font-weight:560}
.trend-delta.flat:after,.trend-delta.start:after{content:""}
@media (max-width:640px){
  .trend-item{grid-template-columns:72px minmax(72px,1fr) 82px;gap:8px;padding:10px 12px}

.team-card{padding:0;overflow:hidden}

.toolbar{order:4}
#trend{margin-top:8px}
.trend-toggle{background:var(--app-card);border-radius:22px;box-shadow:var(--app-shadow);overflow:hidden}

@media (max-width:720px){

function setNumber(id, value, options = {}){
  const el = $(id);
  if(!el) return;
  const decimals = options.decimals || 0;
  const format = n => decimals ? Number(n).toFixed(decimals) : fmt(Math.round(n));
  if(prefersReducedMotion()){
    el.textContent = format(value);
    el.dataset.value = value;
    return;
  }
  const from = Number(el.dataset.value || el.textContent.replace(/[^0-9.-]/g, '') || 0);
  const to = Number(value || 0);
  el.dataset.value = to;
  const start = performance.now();
  const duration = options.duration || 520;
  function tick(now){
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = format(from + (to - from) * eased);
    if(p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function setupReveal(){

  if(prefersReducedMotion() || !('IntersectionObserver' in window)){
    items.forEach(el => el.classList.add('is-visible'));
    return;
  }
  if(window.__psmRevealObserver) window.__psmRevealObserver.disconnect();
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold:.12 });
  window.__psmRevealObserver = observer;
  items.forEach(el => {
    if(!el.classList.contains('is-visible')) observer.observe(el);
  });
}

    if(btn) btn.classList.add('active');
  }, { rootMargin:'-35% 0px -50% 0px', threshold:[.1,.25,.5] });
  ['home','top','trend','teams'].forEach(id => { const el = $(id); if(el) observer.observe(el); });
}

function arrangeProductFlow(){

function setupMobileAppMode(){
  const apply = () => document.body.classList.toggle('mobile-app', innerWidth <= 720);
  apply();
  addEventListener('resize', apply, { passive:true });
  document.addEventListener('pointerdown', e => {

  }, { passive:true });
  document.addEventListener('pointercancel', () => {

  }, { passive:true });
}

function sortedTeams(source = state.teams){
  const list = source.map(t => ({ ...t, rate: rate(t), remain: remain(t) }));
  return list.sort((a,b) => {
    if(state.sort === 'result') return b.result - a.result || b.rate - a.rate;
    if(state.sort === 'remain') return a.remain - b.remain || b.rate - a.rate;
    if(state.sort === 'team') return a.team.localeCompare(b.team, 'ko');
    return b.rate - a.rate || b.result - a.result || a.team.localeCompare(b.team, 'ko');
  });
}

function watchTeamSet(source, deltas){
  return new Set(source
    .slice()
    .sort((a,b) => rate(a) - rate(b) || Number(a.result || 0) - Number(b.result || 0) || a.team.localeCompare(b.team, 'ko'))
    .slice(0, 10)
    .map(t => t.team));
}

function filteredTeams(rankMap, source = state.teams, deltas = new Map()){
  const q = norm($('q').value);
  let list = sortedTeams(source).filter(t => !q || norm(t.team).includes(q) || norm(t.leader).includes(q) || teamMembers(t).some(m => norm(memberName(m)).includes(q) || norm(memberBranch(m)).includes(q) || norm(memberTrait(m)).includes(q)));
  if(state.filter === 'top10') list = list.filter(t => rankMap.get(t.team) <= 10);
  if(state.filter === 'watch'){
    const watch = watchTeamSet(source, deltas);
    list = list.filter(t => watch.has(t.team));
  }
  if(state.filter === 'over55') list = list.filter(t => t.rate >= 55);
  if(state.filter === 'over60') list = list.filter(t => t.rate >= 60);
  if(state.filter === 'over65') list = list.filter(t => t.rate >= 65);
  if(state.filter === 'done') list = list.filter(t => t.rate >= 100);
  return list;
}

function availableTimes(){
  return [...new Set(state.history.map(t => t.timeRaw).filter(Boolean))].sort();
}

function activeTimeRaw(){
  const times = availableTimes();
  if(state.selectedTime === 'latest') return state.latestTimeRaw || times[times.length - 1] || '';
  return state.selectedTime;
}

function previousTimeRaw(timeRaw = activeTimeRaw()){
  const times = availableTimes().filter(t => !timeRaw || t < timeRaw);
  return times[times.length - 1] || '';
}

function previousDayTimeRaw(timeRaw = activeTimeRaw()){
  const day = (timeRaw || '').slice(0, 8);
  const times = availableTimes().filter(t => t < timeRaw && t.slice(0, 8) < day);
  return times[times.length - 1] || '';
}

function dailyBaseTimeRaw(timeRaw = activeTimeRaw()){
  const day = (timeRaw || '').slice(0, 8);
  if(!day) return '';
  const sameDayTimes = availableTimes().filter(t => t && t <= timeRaw && t.slice(0, 8) === day);
  const nineTime = sameDayTimes.find(t => t.slice(8, 10) === '09');
  if(nineTime) return nineTime;
  return sameDayTimes[0] || previousDayTimeRaw(timeRaw);
}

function snapshotTeams(timeRaw = activeTimeRaw()){
  if(!state.history.length || !timeRaw) return state.teams.map(t => ({ ...t }));
  const byTeam = new Map();
  state.history
    .filter(item => item.timeRaw && item.timeRaw <= timeRaw)
    .sort((a,b) => a.timeRaw.localeCompare(b.timeRaw))
    .forEach(item => byTeam.set(norm(item.team), item));
  return state.teams.map(t => {
    const row = byTeam.get(norm(t.team));
    return row ? { ...t, target:row.target, result:row.result, timeRaw:row.timeRaw } : { ...t };
  });
}

function rankMapFor(list){
  return new Map([...list]
    .map(t => ({ ...t, rate: rate(t), remain: remain(t) }))
    .sort((a,b) => b.rate - a.rate || b.result - a.result || a.team.localeCompare(b.team, 'ko'))
    .map((t,i) => [t.team, i + 1]));
}

function teamDeltaMap(currentList, timeRaw = activeTimeRaw()){
  const prevTime = dailyBaseTimeRaw(timeRaw);
  const prevList = prevTime ? snapshotTeams(prevTime) : [];
  const prevByTeam = new Map(prevList.map(t => [norm(t.team), t]));
  const prevRank = rankMapFor(prevList);
  const currentRank = rankMapFor(currentList);
  const map = new Map();
  currentList.forEach(t => {
    const prev = prevByTeam.get(norm(t.team));
    const resultDelta = prev ? Number(t.result || 0) - Number(prev.result || 0) : 0;
    const beforeRank = prev ? prevRank.get(prev.team) : null;
    const nowRank = currentRank.get(t.team);
    map.set(t.team, {
      resultDelta,
      rankDelta: beforeRank && nowRank ? beforeRank - nowRank : 0,
      prevTime
    });
  });
  return map;
}

function dailyDeltaMap(currentList, timeRaw = activeTimeRaw()){
  const baseTime = dailyBaseTimeRaw(timeRaw);
  const baseList = baseTime ? snapshotTeams(baseTime) : [];
  const baseByTeam = new Map(baseList.map(t => [norm(t.team), t]));
  const map = new Map();
  currentList.forEach(t => {
    const base = baseByTeam.get(norm(t.team));
    map.set(t.team, {
      resultDelta: Math.max(Number(t.result || 0) - Number(base?.result || 0), 0),
      baseTime
    });
  });
  return map;
}

function rankChangeText(delta){
  if(delta > 0) return `<span class="rank-change up">▲ ${delta}</span>`;
  if(delta < 0) return `<span class="rank-change down">▼ ${Math.abs(delta)}</span>`;
  return `<span class="rank-change flat">-</span>`;
}

function deltaText(delta){
  const cls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
  const sign = delta > 0 ? '+' : '';
  return `<span class="team-delta ${cls}">${sign}${fmt(delta)}천원</span>`;
}

function percentPointText(value){
  const n = Number(value || 0);
  if(n > 0) return '+' + n.toFixed(1) + '%p';
  if(n < 0) return n.toFixed(1) + '%p';
  return '0.0%p';
}

function rankDeltaMarkup(delta = { rankDelta:0 }){
  const n = Number(delta.rankDelta || 0);
  if(n > 0) return '<span class="rank-shift up" title="전일 대비 순위 상승">▲' + n + '</span>';
  if(n < 0) return '<span class="rank-shift down" title="전일 대비 순위 하락">▼' + Math.abs(n) + '</span>';
  return '';
}

function rankBadgeMarkup(rank, delta = { rankDelta:0 }){
  return '<span class="rank-badge"><strong>' + rank + '등</strong>' + rankDeltaMarkup(delta) + '</span>';
}

function targetRemainText(t, targetRate){
  const need = Math.max(Math.ceil(Number(t.target || 0) * targetRate - Number(t.result || 0)), 0);
  return need ? fmt(need) + '천원' : '완료';
}

function statusMapFor(currentList, deltas){
  const rows = currentList.map(t => ({
    team: t.team,
    delta: Number(deltas.get(t.team)?.resultDelta || 0)
  }));
  if(!rows.length) return new Map();
  if(!rows.some(t => t.delta > 0)) return new Map();
  const statusMap = new Map();
  const ranked = rows
    .slice()
    .sort((a,b) => b.delta - a.delta || a.team.localeCompare(b.team, 'ko'));
  ranked.forEach((t, i) => {
    const realRank = i + 1;
    if(realRank <= 10) statusMap.set(t.team, ['realtime-top', '당일 ' + realRank + '위']);
    if(realRank > ranked.length - 10) statusMap.set(t.team, ['realtime-low', '당일 ' + realRank + '위']);
  });
  return statusMap;
}

function renderTimeTabs(){
  const tabs = $('timeTabs');
  if(!tabs) return;
  if(!tabs.dataset.bound){
    tabs.dataset.bound = 'true';
    tabs.addEventListener('click', e => {
      const btn = e.target.closest('.time-tab');
      if(!btn || !tabs.contains(btn)) return;
      state.selectedTime = btn.dataset.time;
      render();
    });
  }
  const times = availableTimes();
  if(state.selectedTime !== 'latest' && !times.includes(state.selectedTime)) state.selectedTime = 'latest';
  const buttons = [{ label:'최신', value:'latest' }].concat(times.slice(-5).reverse().map(t => ({ label:shortSheetTime(t), value:t })));
  const signature = buttons.map(item => item.value).join('|') + '::' + state.selectedTime;
  if(tabs.dataset.signature === signature) return;
  tabs.dataset.signature = signature;
  tabs.innerHTML = buttons.map(item => `<button class="time-tab ${state.selectedTime === item.value ? 'active' : ''}" data-time="${item.value}" type="button" aria-pressed="${state.selectedTime === item.value}">${item.label}</button>`).join('');
}

function renderRising(currentList, deltas, timeRaw = activeTimeRaw()){
  const box = $('risingList');
  if(!box) return;
  const rows = currentList
    .map(t => ({ ...t, delta:deltas.get(t.team) || { resultDelta:0, rankDelta:0 } }))
    .sort((a,b) => b.delta.resultDelta - a.delta.resultDelta || rate(b) - rate(a))
    .slice(0,5);
  $('risingSummary').textContent = timeRaw ? shortSheetTime(timeRaw) + ' 당일 실적' : '당일 실적';
  box.innerHTML = rows.map((t,i) => `<button class="rising-card" type="button" aria-label="상승 팀 상세 보기" onclick="focusTeam('${encodeURIComponent(t.team)}')">
    <div class="rising-team">${esc(t.team)}</div>
    <div class="rising-delta">${t.delta.resultDelta > 0 ? '+' : ''}${fmt(t.delta.resultDelta)}천원</div>
    <div class="rising-meta">현재 ${rate(t).toFixed(1)}%</div>
  </button>`).join('');
}

function updateFilterCounts(source, rankMap, deltas = new Map()){
  const watch = watchTeamSet(source, deltas);
  const counts = {
    all: source.length,
    top10: source.filter(t => rankMap.get(t.team) <= 10).length,
    watch: watch.size,
    over55: source.filter(t => rate(t) >= 55).length,
    over60: source.filter(t => rate(t) >= 60).length,
    over65: source.filter(t => rate(t) >= 65).length,
    done: source.filter(t => rate(t) >= 100).length
  };
  const labels = {
    all:'전체',
    top10:'상위 10',
    watch:'하위10',
    over55:'55% 달성',
    over60:'60% 달성',
    over65:'65% 달성',
    done:'목표 달성'
  };
  document.querySelectorAll('.chip').forEach(btn => {
    const key = btn.dataset.filter;
    const count = counts[key] ?? 0;
    btn.innerHTML = `${labels[key] || btn.textContent}<span class="chip-count">${count}</span>`;
    btn.classList.toggle('is-empty', key !== 'all' && count === 0);
  });
}

function render(){
  const currentTime = state.latestTimeRaw || availableTimes().at(-1) || '';
  const displayTeams = snapshotTeams(currentTime);
  const deltas = teamDeltaMap(displayTeams, currentTime);
  const selectedTime = activeTimeRaw();
  const summaryTeams = snapshotTeams(selectedTime);
  const risingTeams = snapshotTeams(currentTime);
  const risingDeltas = dailyDeltaMap(risingTeams, currentTime);
  const ranked = [...displayTeams].map(t => ({ ...t, rate: rate(t), remain: remain(t), delta:deltas.get(t.team) })).sort((a,b) => b.rate - a.rate || b.result - a.result || a.team.localeCompare(b.team, 'ko'));
  const rankMap = new Map(ranked.map((t,i) => [t.team, i + 1]));
  const total = totals(summaryTeams);
  const overall = total.target ? total.result / total.target * 100 : 0;
  setNumber('overallRate', overall, { decimals:1 });
  $('overallBar').style.width = Math.min(overall, 100) + '%';
  $('overallNote').textContent = fmt(total.result) + ' / ' + fmt(total.target) + '천원';
  setNumber('totalResult', total.result);
  $('totalTarget').textContent = '목표 ' + fmt(total.target) + '천원';
  setNumber('teamCount', state.teams.length);
  setNumber('memberCount', total.members);
  renderTimeTabs();
  renderRising(risingTeams, risingDeltas, currentTime);
  updateFilterCounts(displayTeams, rankMap, deltas);
  $('topTeamPill').innerHTML = '챌린지 실적 기준<br>5명이하 : 7월 목표 1등 팀원, 6월 힘들었던 팀원 목표 10%가산<br>6명이상 : 추가로 팀장 실적 10% 가산';
  const dailyDeltas = dailyDeltaMap(displayTeams, currentTime);
  $('topList').innerHTML = ranked.slice(0,10).map((t,i) => rankCard(t, i, dailyDeltas.get(t.team))).join('');
  const teamParam = new URLSearchParams(location.search).get('team');
  const statusMap = statusMapFor(displayTeams, dailyDeltas);
  const list = filteredTeams(rankMap, displayTeams, deltas).map(t => ({ ...t, delta:deltas.get(t.team), dailyDelta:dailyDeltas.get(t.team) }));
  $('grid').innerHTML = list.map(t => teamCard(t, rankMap.get(t.team), teamParam && norm(teamParam) === norm(t.team), t.delta, statusMap.get(t.team), t.dailyDelta)).join('');
  $('listCount').textContent = fmt(list.length) + '팀';
  updateActiveHint(list.length, state.teams.length);
  $('empty').style.display = list.length ? 'none' : 'block';
  if(!list.length) $('empty').textContent = '현재 선택한 시점에는 해당 조건의 팀이 없습니다.';
  populateTrendTeamSelect();
  renderTrend();
  setupReveal();
}

function updateActiveHint(visible, total){
  const q = $('q').value.trim();
  const filterLabel = document.querySelector('.chip.active')?.childNodes[0]?.textContent?.trim() || '전체';
  const sortLabel = $('sort').selectedOptions[0]?.textContent || '달성률순';
  const searchText = q ? ` · 검색 "${q}"` : '';
  $('activeHint').textContent = `${filterLabel} ${fmt(visible)}팀 / 전체 ${fmt(total)}팀 · ${sortLabel}${searchText}`;
  $('clearSearch').classList.toggle('is-visible', Boolean(q));
}

function populateTrendTeamSelect(){
  const select = $('trendTeamSelect');
  if(!select) return;
  const current = state.trendTeam;
  const teams = state.teams.slice().sort((a,b) => a.team.localeCompare(b.team, 'ko'));
  const signature = teams.map(t => t.team).join('|');
  if(select.dataset.signature !== signature){
    select.dataset.signature = signature;
    select.innerHTML = '<option value="">팀 선택</option>' + teams
      .map(t => `<option value="${esc(t.team)}">${esc(t.team)}</option>`)
      .join('');
  }
  select.value = state.teams.some(t => t.team === current) ? current : '';
  if(current && !select.value) state.trendTeam = '';
}

function setTrendTeam(team){
  state.trendTeam = team || '';
  const select = $('trendTeamSelect');
  const allBtn = $('trendAllBtn');
  if(select) select.value = state.trendTeam;
  if(allBtn) allBtn.classList.toggle('active', !state.trendTeam);
  renderTrend();
}

function showTeamTrend(team){
  const decoded = decodeURIComponent(team || '');
  const details = document.querySelector('#trend details');
  if(details) details.open = true;
  setTrendTeam(decoded);
  $('trend').scrollIntoView({ behavior:'smooth', block:'start' });
}

function renderTrend(){
  const chart = $('trendChart');
  if(!chart) return;
  const selectedTeam = state.trendTeam;
  const source = state.history.length ? state.history : state.teams.map(t => ({ ...t, timeRaw: '' }));
  const scoped = selectedTeam ? source.filter(t => norm(t.team) === norm(selectedTeam)) : source;
  const grouped = new Map();
  scoped.forEach(t => {
    const key = t.timeRaw || 'baseline';
    if(!grouped.has(key)) grouped.set(key, { timeRaw:key, target:0, result:0 });
    const item = grouped.get(key);
    item.target += Number(t.target || 0);
    item.result += Number(t.result || 0);
  });
  if(selectedTeam && !grouped.size){
    const fallback = state.teams.find(t => norm(t.team) === norm(selectedTeam));
    if(fallback) grouped.set('baseline', { timeRaw:'baseline', target:fallback.target, result:fallback.result });
  }
  const points = [...grouped.values()].sort((a,b) => a.timeRaw.localeCompare(b.timeRaw)).slice(-8);
  const currentTeam = selectedTeam ? state.teams.find(t => norm(t.team) === norm(selectedTeam)) : null;
  const teamTarget = currentTeam ? Number(currentTeam.target || 0) : 0;
  const isTeamTrend = Boolean(selectedTeam && teamTarget);
  const trendValue = p => isTeamTrend ? (Number(p.result || 0) / teamTarget) * 100 : Number(p.result || 0);
  const max = isTeamTrend ? 100 : Math.max(...points.map(p => Number(p.result || 0)), 1);
  const graphValues = points.map(trendValue);
  let graphMin = 0, graphMax = max;
  if(isTeamTrend && graphValues.length){
    const minValue = Math.min(...graphValues);
    const maxValue = Math.max(...graphValues);
    const range = Math.max(maxValue - minValue, 0);
    const padding = Math.max(range * .45, 1.6);
    graphMin = Math.max(0, minValue - padding);
    graphMax = Math.min(100, maxValue + padding);
    if(graphMax - graphMin < 5){
      const center = (graphMax + graphMin) / 2;
      graphMin = Math.max(0, center - 2.5);
      graphMax = Math.min(100, center + 2.5);
    }
    if(graphMax <= graphMin) graphMax = graphMin + 1;
  }
  const latest = points[points.length - 1];
  const prev = points[points.length - 2];
  const delta = latest && prev ? trendValue(latest) - trendValue(prev) : 0;
  const labelPrefix = selectedTeam ? selectedTeam + ' · ' : '';
  $('trendSummary').textContent = points.length > 1
    ? `${labelPrefix}최근 ${points.length}개 시점 · ${isTeamTrend ? percentPointText(delta) : (delta >= 0 ? '+' : '') + fmt(delta) + '천원'}`
    : `${labelPrefix}최근 업데이트 기준`;
  const allBtn = $('trendAllBtn');
  if(allBtn) allBtn.classList.toggle('active', !selectedTeam);
  chart.dataset.scope = selectedTeam ? 'team' : 'all';
  chart.setAttribute('aria-label', selectedTeam ? selectedTeam + ' 시간대별 실적 추이' : '시간대별 전체 실적 추이');
  const width = 320, height = 178, left = 20, right = 300, top = 22, bottom = 142;
  const xStep = points.length > 1 ? (right - left) / (points.length - 1) : 0;
  const coords = points.map((p, i) => {
    const ratio = Math.min(Math.max((trendValue(p) - graphMin) / (graphMax - graphMin), 0), 1);
    return {
      x: points.length > 1 ? left + xStep * i : (left + right) / 2,
      y: bottom - ratio * (bottom - top),
      point:p
    };
  });
  const linePath = coords.map((p, i) => `${i ? 'L' : 'M'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const fillPath = coords.length ? `M ${coords[0].x.toFixed(1)} ${bottom} ${linePath} L ${coords[coords.length - 1].x.toFixed(1)} ${bottom} Z` : '';
  const graph = `<div class="line-graph">
    <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${selectedTeam ? esc(selectedTeam) : '전체'} 실적 선그래프">
      <line class="line-grid" x1="${left}" y1="${top}" x2="${right}" y2="${top}"></line>
      <line class="line-grid" x1="${left}" y1="${(top + bottom) / 2}" x2="${right}" y2="${(top + bottom) / 2}"></line>
      <line class="line-grid" x1="${left}" y1="${bottom}" x2="${right}" y2="${bottom}"></line>
      <path class="line-fill" d="${fillPath}"></path>
      <path class="line-path" d="${linePath}"></path>
      ${coords.map((p,i) => `<circle class="line-dot ${i === coords.length - 1 ? 'is-latest' : ''}" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5"></circle>`).join('')}
    </svg>
  </div>`;
  const allRows = points.map((p, i) => {
    const value = trendValue(p);
    const diff = i ? Number(p.result || 0) - Number(points[i - 1].result || 0) : 0;
    const diffClass = i ? (diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat') : 'start';
    const label = p.timeRaw === 'baseline' ? '기준값' : shortSheetTime(p.timeRaw);
    const valueText = fmt(p.result);
    const diffText = i ? (diff >= 0 ? '+' : '') + fmt(diff) : '-';
    return { index:i, html:`<div class="trend-item">
      <div class="trend-label">${label}</div>
      <div class="trend-bar-wrap"><div class="trend-bar ${i === points.length - 1 ? 'is-latest' : ''}" style="width:${Math.min(Math.max((value / max) * 100, 4), 100)}%"></div></div>
      <div class="trend-value">${valueText}</div>
      <div class="trend-delta ${diffClass}">${diffText}</div>
    </div>` };
  }).reverse();
  const visibleRows = state.trendExpanded ? allRows : allRows.slice(0, 5);
  const moreButton = allRows.length > 5
    ? `<button class="trend-more" type="button" onclick="toggleTrendList()">${state.trendExpanded ? '접기' : '더보기'}</button>`
    : '';
  chart.innerHTML = graph + `<div class="trend-list">${visibleRows.map(row => row.html).join('')}</div>${moreButton}`;
}

function toggleTrendList(){
  state.trendExpanded = !state.trendExpanded;
  renderTrend();
}
window.toggleTrendList = toggleTrendList;

function rankCard(t, i, delta = { resultDelta:0, rankDelta:0 }) {
  return `<button class="rank-card" type="button" aria-label="랭킹 팀 상세 보기" onclick="focusTeam('${encodeURIComponent(t.team)}')">
    <div class="rank-top"><div class="rank-no">${i + 1}</div><div class="rank-rate">${t.rate.toFixed(1)}%</div></div>
    <div class="rank-team">${esc(t.team)}</div>
    <div class="rank-meta">팀장 ${esc(t.leader)} · 실적 ${fmt(t.result)}천원</div>
    <div class="rank-meta">당일 실적 ${deltaText(delta.resultDelta)}</div>
  </button>`;
}

function teamCard(t, rank, highlight, delta = { resultDelta:0, rankDelta:0 }, status = null, dailyDelta = { resultDelta:0 }){
  const p = rate(t), capped = Math.min(p, 100), members = teamMembers(t);
  const ringColor = p >= 100 ? 'var(--accent)' : p < 10 ? 'var(--warn)' : 'var(--brand-2)';
  const statusMarkup = status ? `<span class="team-status ${status[0]}">${status[1]}</span>` : '';
  return `<article class="team-card ${highlight ? 'highlight' : ''}" id="team-${encodeURIComponent(t.team)}">
    <button class="team-summary" type="button" onclick="toggleTeam(this)" aria-expanded="false">
      <span class="team-rank-left">${rankBadgeMarkup(rank, delta)}</span>
      <span class="team-main"><span class="team-title">${esc(t.team)}</span>${statusMarkup}</span>
      <span class="team-side"><b>${p.toFixed(1)}%</b><span class="team-daily-inline">당일 ${deltaText(dailyDelta.resultDelta || 0)}</span></span>
    </button>
    <div class="team-progress"><span style="width:${capped}%;background:${ringColor}"></span></div>
    <div class="team-detail">
      <div class="detail-grid detail-readable">
        <div class="detail-panel info-panel">
          <span class="detail-panel-title"><span class="detail-title-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M8 7.5h8"/><path d="M8 12h8"/><path d="M8 16.5h5"/><rect x="5" y="4" width="14" height="16" rx="3"/></svg></span>기본 정보</span>
          <div class="detail-info-list">
            <div class="detail-info-row"><span>팀장</span><b>${esc(t.leader)}</b></div>
            <div class="detail-info-row"><span>목표</span><b>${fmt(t.target)}천원</b></div>
            <div class="detail-info-row"><span>실적</span><b>${fmt(t.result)}천원</b></div>
          </div>
        </div>
        <div class="detail-panel target-panel">
          <span class="detail-panel-title"><span class="detail-title-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/><path d="M12 2.5v3"/><path d="M21.5 12h-3"/><path d="M12 21.5v-3"/><path d="M5.5 12h-3"/></svg></span>목표 구간까지</span>
          <div class="target-steps">
            <div class="target-step"><span>55%</span><b>${targetRemainText(t, .55)}</b></div>
            <div class="target-step"><span>60%</span><b>${targetRemainText(t, .60)}</b></div>
            <div class="target-step"><span>65%</span><b>${targetRemainText(t, .65)}</b></div>
          </div>
        </div>
      </div>
      <div class="team-actions"><button class="link-btn" type="button" onclick="shareTeam('${encodeURIComponent(t.team)}')">공유</button><button class="link-btn" type="button" onclick="toggleMembers(this)">팀원 ${members.length}명</button></div>
      <div class="members">${members.map(m => '<span class="member"><span class="member-name-row"><b>' + esc(memberName(m)) + '</b>' + memberTraitIcon(m, members.length) + '</span>' + (memberMeta(m) ? '<small>' + esc(memberMeta(m)) + '</small>' : '') + '</span>').join('')}</div>
    </div>
  </article>`;
}

function toggleMembers(btn){
  const box = btn.closest('.team-card').querySelector('.members');
  const open = box.classList.toggle('open');
  btn.textContent = open ? '접기' : '팀원 ' + box.children.length + '명';
}

function toggleTeam(btn){
  const card = btn.closest('.team-card');
  const open = card.classList.toggle('open');
  btn.setAttribute('aria-expanded', String(open));
}

function focusTeam(name){
  const targetName = decodeURIComponent(name || '');
  const targetId = 'team-' + encodeURIComponent(targetName);
  let el = $(targetId);
  if(!el){
    state.filter = 'all';
    $('q').value = '';
    document.querySelectorAll('.chip').forEach(x => x.classList.toggle('active', x.dataset.filter === 'all'));
    render();
    el = $(targetId);
  }
  if(el){ el.scrollIntoView({ behavior:'smooth', block:'center' }); el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 1800); }
}

async function shareTeam(name){
  const teamName = decodeURIComponent(name);
  const url = new URL(location.href);
  url.searchParams.set('team', teamName);
  try{
    await navigator.clipboard.writeText(url.toString());
    showNotice('공유 링크가 복사되었습니다.', 'ok');
  }catch(e){
    location.href = url.toString();
  }
}

function parseCSV(text){
  const rows = [];
  let row = [], cur = '', quote = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i], n = text[i + 1];
    if(c === '"'){
      if(quote && n === '"'){ cur += '"'; i++; }
      else quote = !quote;
    }else if(c === ',' && !quote){
      row.push(cur.trim());
      cur = '';
    }else if((c === '\n' || c === '\r') && !quote){
      if(c === '\r' && n === '\n') i++;
      row.push(cur.trim());
      cur = '';
      if(row.some(v => v !== '')) rows.push(row);
      row = [];
    }else{
      cur += c;
    }
  }
  row.push(cur.trim());
  if(row.some(v => v !== '')) rows.push(row);
  return rows;
}

function findColumn(headers, names){
  const normalized = headers.map(norm);
  return names.map(norm).reduce((found, name) => found >= 0 ? found : normalized.findIndex(h => h === name || h.includes(name)), -1);
}

function sheetTeam(row){
  return {
    team: row.team || '',
    leader: row.leader || '',
    members: Array.isArray(row.members) ? row.members : [],
    target: Number(row.target || 0),
    result: Number(row.result || 0),
    timeRaw: row.timeRaw || ''
  };
}

function applyRows(rows){
  if(!rows || rows.length < 2) throw new Error('empty');
  const headers = rows[0].map(v => (v || '').trim());
  const teamIndex = findColumn(headers, ['팀명','팀','team']);
  const targetIndex = findColumn(headers, ['목표','target']);
  const resultIndex = findColumn(headers, ['실적','result']);
  const timeIndex = findColumn(headers, ['시간','업데이트','기준','time','updated']);
  if(teamIndex < 0 || targetIndex < 0 || resultIndex < 0) throw new Error('columns');
  const latestByTeam = new Map();
  const history = [];
  let sheetTimeRaw = '';
  rows.slice(1).forEach(r => {
    const name = (r[teamIndex] || '').trim();
    const timeRaw = (r[timeIndex >= 0 ? timeIndex : 3] || '').toString().replace(/\D/g, '');
    if(!name) return;
    const item = { team:name, target: parseNumber(r[targetIndex]), result: parseNumber(r[resultIndex]), timeRaw };
    history.push(item);
    const key = norm(name);
    const current = latestByTeam.get(key);
    if(!current || (timeRaw && timeRaw >= (current.timeRaw || ''))) latestByTeam.set(key, item);
    if(timeRaw && timeRaw > sheetTimeRaw) sheetTimeRaw = timeRaw;
  });
  if(!latestByTeam.size) throw new Error('no rows');
  state.history = history;
  state.latestTimeRaw = sheetTimeRaw;
  if(state.selectedTime !== 'latest' && !availableTimes().includes(state.selectedTime)) state.selectedTime = 'latest';
  const baseKeys = new Set(BASE_TEAMS.map(t => norm(t.team)));
  const merged = BASE_TEAMS.map(t => latestByTeam.has(norm(t.team)) ? { ...t, ...latestByTeam.get(norm(t.team)) } : { ...t });
  latestByTeam.forEach((item, key) => {
    if(!baseKeys.has(key)) merged.push(sheetTeam(item));
  });
  state.teams = merged;
  showNotice('', 'hide');
  setBasis(parseSheetTime(sheetTimeRaw));
  $('syncState').textContent = '';
  render();
}

function applyMemberRows(rows){
  if(!rows || rows.length < 2) throw new Error('member empty');
  const headers = rows[0].map(v => (v || '').trim());
  const teamIndex = findColumn(headers, ['팀명','팀','team']);
  const nameIndex = findColumn(headers, ['이름','팀원','name','member']);
  const branchIndex = findColumn(headers, ['지점','소속지점','소속','branch','office']);
  const traitIndex = findColumn(headers, ['특성','팀원특성','구분','trait','role']);
  const leaderIndex = findColumn(headers, ['팀장','leader']);
  if(teamIndex < 0 || nameIndex < 0) throw new Error('member columns');
  const map = new Map();
  rows.slice(1).forEach(r => {
    const team = (r[teamIndex] || '').trim();
    const name = (r[nameIndex] || '').trim();
    const branch = branchIndex >= 0 ? (r[branchIndex] || '').trim() : '';
    const trait = traitIndex >= 0 ? (r[traitIndex] || '').trim() : '';
    if(!team || !name) return;
    const key = norm(team);
    if(!map.has(key)) map.set(key, { team, members: [], leader: '' });
    const item = map.get(key);
    const existing = item.members.find(m => norm(memberName(m)) === norm(name));
    if(existing){
      existing.branch = existing.branch || branch;
      existing.trait = existing.trait || trait;
    }else{
      item.members.push({ name, branch, trait });
    }
    if(leaderIndex >= 0 && r[leaderIndex]) item.leader = r[leaderIndex].trim();
  });
  if(!map.size) throw new Error('member no rows');
  state.teams = state.teams.map(t => {
    const item = map.get(norm(t.team));
    if(!item) return t;
    const leader = item.leader || t.leader || memberName(item.members[0]);
    return { ...t, members: teamMembers({ ...t, leader, members: item.members }), leader };
  });
  const existing = new Set(state.teams.map(t => norm(t.team)));
  map.forEach((item, key) => {
    if(existing.has(key)) return;
    const leader = item.leader || memberName(item.members[0]);
    state.teams.push(sheetTeam({
      team: item.team,
      leader,
      members: teamMembers({ leader, members: item.members })
    }));
  });
}

function showNotice(text, mode){
  const n = $('notice');
  if(mode === 'hide' || !text){ n.style.display = 'none'; n.textContent = ''; return; }
  n.style.display = 'block'; n.textContent = text;
}

async function loadSheet(){
  if(state.loading) return;
  state.loading = true;
  $('refreshBtn').disabled = true;
  try{
    const res = await fetch(CSV_URL + '&cacheBust=' + Date.now());
    if(!res.ok) throw new Error('network');
    applyRows(parseCSV(await res.text()));
    try{
      const memberRes = await fetch(MEMBER_CSV_URL + '&cacheBust=' + Date.now());
      if(!memberRes.ok) throw new Error('member network');
      applyMemberRows(parseCSV(await memberRes.text()));
      render();
    }catch(memberError){
      console.warn('Member CSV load failed:', memberError);
    }
  }catch(e){
    console.warn('CSV load failed:', e);
    state.teams = structuredClone(BASE_TEAMS);
    state.history = [];
    state.latestTimeRaw = '';
    state.selectedTime = 'latest';
    setBasis();
    $('syncState').textContent = '기본 데이터 표시';
    showNotice('시트 연결 지연. 기본 데이터를 표시합니다.', 'warn');
    render();
  }finally{
    state.loading = false;
    $('refreshBtn').disabled = false;
  }
}

document.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
  btn.classList.add('active'); state.filter = btn.dataset.filter; render();
}));
document.querySelectorAll('[data-go]').forEach(btn => btn.addEventListener('click', () => {
  $(btn.dataset.go).scrollIntoView({ behavior:'smooth', block:'start' });
  document.querySelectorAll('[data-go]').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
}));
$('q').addEventListener('input', render);
$('clearSearch').addEventListener('click', () => {
  $('q').value = '';
  $('q').focus();
  render();
});
$('q').addEventListener('keydown', e => {
  if(e.key === 'Escape' && $('q').value){
    $('q').value = '';
    render();
  }
});
$('sort').addEventListener('change', e => { state.sort = e.target.value; render(); });
$('trendAllBtn').addEventListener('click', () => setTrendTeam(''));
$('trendTeamSelect').addEventListener('change', e => setTrendTeam(e.target.value));
$('refreshBtn').addEventListener('click', loadSheet);
$('themeBtn').addEventListener('click', () => setTheme(document.body.classList.contains('dark') ? 'light' : 'dark'));
setTheme(localStorage.getItem('psm-theme'));
setBasis(); setupMobileAppMode(); arrangeProductFlow(); render(); setupSectionSpy(); loadSheet();
setTimeout(() => { const p = new URLSearchParams(location.search).get('team'); if(p) focusTeam(encodeURIComponent(p)); }, 700);
</script>
