<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>PSM 소통트립 챌린지</title>
<style>
:root {
  --bg:#f6f8ff; --card:#ffffff; --text:#111827; --muted:#6b7280; --line:#e9edf7;
  --blue:#2563eb; --blue2:#7c3aed; --gold:#f59e0b; --green:#10b981; --orange:#f97316;
  --shadow:0 14px 40px rgba(20,34,80,.10); --radius:22px;
}
@media (prefers-color-scheme: dark) {:root {--bg:#08111f; --card:#111c2e; --text:#f9fafb; --muted:#9ca3af; --line:#24324a; --shadow:0 18px 50px rgba(0,0,0,.38);}}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,"Noto Sans KR",Arial,sans-serif;background:radial-gradient(circle at top left,rgba(37,99,235,.20),transparent 34%),radial-gradient(circle at 85% 8%,rgba(124,58,237,.18),transparent 30%),var(--bg);color:var(--text);padding-bottom:84px;}
.app{max-width:760px;margin:0 auto;padding:18px 16px 28px}
.hero{position:sticky;top:0;z-index:10;margin:0 -16px 12px;padding:16px 16px 12px;background:linear-gradient(to bottom,var(--bg) 78%,transparent);backdrop-filter:blur(16px)}
.eyebrow{display:inline-flex;gap:7px;align-items:center;padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.35);font-size:12px;color:var(--muted);font-weight:700}
h1{font-size:28px;line-height:1.08;margin:13px 0 6px;letter-spacing:-.8px} .subtitle{margin:0;color:var(--muted);font-weight:650}
.summary{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:10px;margin:18px 0 12px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 12px;box-shadow:var(--shadow)}
.kpi b{display:block;font-size:22px;letter-spacing:-.5px} .kpi span{font-size:12px;color:var(--muted);font-weight:750}
.myteam{display:none;margin:10px 0 14px;padding:14px;border-radius:20px;background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(37,99,235,.10));border:1px solid rgba(245,158,11,.35)}
.topbox,.syncbox{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin:12px 0}
.section-title{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px;border:0;background:transparent;color:var(--text);font:inherit;font-weight:900;font-size:16px;text-align:left}
.chev{transition:.2s} .collapsed .chev{transform:rotate(-90deg)}
.toplist{padding:0 14px 14px;display:grid;gap:9px}
.rank{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:10px;padding:12px;border-radius:16px;background:rgba(127,127,127,.06);border:1px solid var(--line)}
.medal{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:rgba(245,158,11,.15)} .rank strong{font-size:15px} .rank small{display:block;color:var(--muted);margin-top:2px}
.pct{font-weight:950;color:var(--blue)}
.sync-content{padding:0 16px 16px;color:var(--muted);font-size:13px;line-height:1.5}.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px}
.searchbar{position:sticky;top:112px;z-index:9;margin:14px 0;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:18px;padding:12px 14px;display:flex;gap:9px;align-items:center}
.searchbar input{border:0;outline:0;background:transparent;color:var(--text);font-size:16px;width:100%}
.filters{display:flex;gap:8px;overflow:auto;padding:2px 0 12px;scrollbar-width:none} .filters::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:999px;padding:9px 13px;font-weight:800;box-shadow:0 6px 16px rgba(0,0,0,.04)} .chip.active{color:#fff;background:linear-gradient(135deg,var(--blue),var(--blue2));border-color:transparent}
.grid{display:grid;grid-template-columns:1fr;gap:13px}
.card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--shadow);overflow:hidden;animation:rise .35s ease both}
.card::before{content:"";position:absolute;inset:0 0 auto;height:4px;background:linear-gradient(90deg,var(--blue),var(--blue2));opacity:.9}
.card.highlight{outline:3px solid rgba(245,158,11,.55)}
.cardhead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start} .team{font-size:19px;font-weight:950;letter-spacing:-.5px;line-height:1.22}
.badge{font-size:12px;font-weight:950;padding:7px 10px;border-radius:999px;background:rgba(37,99,235,.10);color:var(--blue);white-space:nowrap}
.leader{display:inline-flex;align-items:center;gap:7px;margin-top:10px;padding:8px 10px;border-radius:999px;background:rgba(245,158,11,.14);color:var(--text);font-weight:900;font-size:13px}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0 12px} .metric{padding:10px;border-radius:14px;background:rgba(127,127,127,.06)} .metric span{display:block;color:var(--muted);font-size:11px;font-weight:850} .metric b{font-size:14px}
.gauge{display:grid;grid-template-columns:76px 1fr;gap:13px;align-items:center;margin-top:6px}
.circle{--p:0; width:76px;height:76px;border-radius:50%;background:conic-gradient(var(--blue) calc(var(--p)*1%), rgba(127,127,127,.14) 0);display:grid;place-items:center}
.circle i{width:58px;height:58px;border-radius:50%;background:var(--card);display:grid;place-items:center;font-style:normal;font-weight:950;font-size:17px}
.barwrap{height:10px;border-radius:999px;background:rgba(127,127,127,.13);overflow:hidden;margin:8px 0} .bar{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .8s cubic-bezier(.2,.8,.2,1)}
.remain{font-size:13px;color:var(--muted);font-weight:750}
.toggle{margin-top:13px;width:100%;border:0;border-radius:14px;padding:12px;background:rgba(37,99,235,.08);color:var(--blue);font-weight:950;font-size:14px}
.members{display:none;padding-top:12px;gap:8px;flex-wrap:wrap} .members.open{display:flex}
.person{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:rgba(127,127,127,.04);font-weight:750;font-size:13px}
.avatar{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-size:12px;font-weight:950}
.empty{text-align:center;color:var(--muted);padding:36px 10px}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:9px 16px calc(9px + env(safe-area-inset-bottom));background:rgba(246,248,255,.82);backdrop-filter:blur(18px);border-top:1px solid var(--line)}
@media (prefers-color-scheme: dark){.bottom{background:rgba(8,17,31,.82)}}
.nav{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px} .nav button{border:0;background:transparent;color:var(--muted);font-weight:850;font-size:12px;padding:8px 4px;border-radius:13px} .nav button.active{background:var(--card);color:var(--blue);box-shadow:0 8px 18px rgba(0,0,0,.08)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(min-width:680px){.grid{grid-template-columns:1fr 1fr} h1{font-size:36px} .searchbar{top:125px}}
</style>
</head><body>
<div class="app">

</div>
<nav class="bottom"><div class="nav" style="grid-template-columns:repeat(3,1fr)"><button class="active" onclick="go('home',this)">홈</button><button onclick="go('top5',this)">TOP5</button><button onclick="go('search',this)">검색</button></div></nav>
<script>
const BASE_TEAMS = [{"team": "나 오늘 밥 안해", "leader": "신유경", "members": ["신유경", "김미라", "백형금", "박정윤", "김해정", "김유랑", "김민숙"], "target": 12080, "result": 896}, {"team": "마음은 하나~", "leader": "한예서", "members": ["한예서", "김애정", "임선희", "최옥남", "석미정"], "target": 12220, "result": 1152}, {"team": "앗!싸리", "leader": "정경화", "members": ["정경화", "유영순", "최은희", "박순희"], "target": 7680, "result": 348}, {"team": "대충~이겼슈~", "leader": "주인애", "members": ["주인애", "김경숙", "오선미", "복경연", "김영란", "권희나"], "target": 11320, "result": 1201}, {"team": "행복찾기", "leader": "예윤정", "members": ["예윤정", "홍은주", "권나영", "김수현"], "target": 9890, "result": 596}, {"team": "타코", "leader": "서명옥", "members": ["서명옥", "선호복", "이미령", "윤미해"], "target": 7460, "result": 922}, {"team": "출근금지 구역으로 출발", "leader": "이경희", "members": ["이경희", "김현숙", "조영주", "송하연"], "target": 7770, "result": 1138}, {"team": "오(5)지게 달리는 언니들~", "leader": "김수현", "members": ["김수현", "김주희", "박미순", "노희정", "최영순"], "target": 12800, "result": 706}, {"team": "美親여자들", "leader": "박정희", "members": ["박정희", "이숙희", "문춘옥", "박영숙"], "target": 9050, "result": 638}, {"team": "여행가자~!", "leader": "조현숙", "members": ["조현숙", "김윤희", "안명주", "이미라", "정은주", "이금희"], "target": 14390, "result": 945}, {"team": "도토리 오형제", "leader": "허혜경", "members": ["허혜경", "김영경", "윤정하", "천소미", "양문희"], "target": 9040, "result": 259}, {"team": "오(5)마이갓동-", "leader": "남궁희", "members": ["남궁희", "김미경", "서애경", "배유정"], "target": 11450, "result": 1058}, {"team": "4륜구동", "leader": "김희묘", "members": ["김희묘", "김정숙", "김순희", "유현숙"], "target": 7300, "result": 984}, {"team": "모기보다 센 빨대", "leader": "이지영", "members": ["이지영", "최남순", "최진아", "국은희", "변섭희"], "target": 8660, "result": 930}, {"team": "매출원정대", "leader": "김진선", "members": ["김진선", "김소현", "최나리", "김보선"], "target": 7620, "result": 1062}, {"team": "광주교차", "leader": "송경하", "members": ["송경하", "박순덕", "구현숙", "심경숙", "임효정"], "target": 8050, "result": 301}, {"team": "즐겁게 삽시다.", "leader": "김종미", "members": ["김종미", "이은숙", "조예진", "안옥자"], "target": 10370, "result": 527}, {"team": "광(미칠광)열 하게 놀아볼까", "leader": "김정화", "members": ["김정화", "이지영", "한아름", "이설호", "송해영", "김정우"], "target": 14220, "result": 615}, {"team": "소통은 내돈내삼, 트립은 니돈내삼", "leader": "김은주", "members": ["김은주", "엄미영", "고다현", "이의주"], "target": 6770, "result": 847}, {"team": "중부걸스 체결 어벤저스~", "leader": "현용은", "members": ["현용은", "임서인", "임경미", "김수연", "최한미"], "target": 9990, "result": 702}, {"team": "의.일아(의정부+일산)걱정마♡", "leader": "최봉애", "members": ["최봉애", "김다연", "이채원", "권경미", "김영란", "박수정"], "target": 11910, "result": 936}, {"team": "일당백5공주", "leader": "조선영", "members": ["조선영", "이수진", "허은경", "송현아", "김혜란"], "target": 13280, "result": 1233}, {"team": "우리가 간다 하와이!!", "leader": "한은희", "members": ["한은희", "허진우", "김명진", "전병원"], "target": 9810, "result": 879}, {"team": "떠나자ㆍ남동!!!", "leader": "김영미", "members": ["김영미", "장혜정", "권채령", "김양현"], "target": 6650, "result": 411}, {"team": "가즈아~ 제주로", "leader": "황세비", "members": ["황세비", "성안제", "박미림", "윤승연"], "target": 8480, "result": 638}, {"team": "대권주자", "leader": "박서윤", "members": ["박서윤", "김은숙", "남정아", "한지선", "김민선", "강미경"], "target": 12680, "result": 671}, {"team": "우리가유~", "leader": "전성미", "members": ["전성미", "박수미", "박연희", "변경희", "권은주"], "target": 11300, "result": 878}, {"team": "구상용의 아이들 외 1인", "leader": "기유리", "members": ["기유리", "김시내", "정건희", "문지현", "서마로", "박정해", "김은정"], "target": 12840, "result": 955}, {"team": "나 오늘 집에 안갈래", "leader": "이혜영", "members": ["이혜영", "김윤정", "김경옥", "김영미", "김수정", "안지숙"], "target": 11210, "result": 1058}, {"team": "놀러가려고 일한 조", "leader": "김미록", "members": ["김미록", "최옥희", "이미화", "김경애"], "target": 10690, "result": 1308}, {"team": "욱이라면어디든", "leader": "김형욱", "members": ["김형욱", "차정숙", "김영경", "최성해", "장혜은", "권옥주", "강단영"], "target": 16280, "result": 1533}, {"team": "기유리 돌아와", "leader": "박지영", "members": ["박지영", "김민정", "박선영", "장은영"], "target": 11940, "result": 1427}, {"team": "신촌 드림투어", "leader": "김혜원", "members": ["김혜원", "조혜진", "박미정", "김미희", "김주현"], "target": 8560, "result": 961}, {"team": "원++식스", "leader": "유정화", "members": ["유정화", "김선화", "김현", let teams = JSON.parse(JSON.stringify(BASE_TEAMS));
const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1pwoa_QvPUiAzhcu0ZsYQfV3Zb7rxiLdbP4v7JZ6yVV4/gviz/tq?tqx=out:csv';
let filter = 'all';
const fmt = n => Number(n||0).toLocaleString('ko-KR');
const pct = t => t.target ? (t.result / t.target * 100) : 0;
const initials = name => (name||'?').trim().slice(0,1);
function normalize(s){return (s||'').toString().replace(/\s/g,'').toLowerCase()}
function ranked(){return [...teams].map(t=>({...t, rate:pct(t)})).sort((a,b)=>b.rate-a.rate || b.result-a.result)}
function render(){
  const r = ranked();
  const rankMap = new Map(r.map((t,i)=>[t.team,i+1]));
  document.getElementById('teamCount').textContent = fmt(teams.length);
  document.getElementById('memberCount').textContent = fmt(teams.reduce((a,t)=>a+t.members.length,0));
  document.getElementById('totalResult').textContent = fmt(teams.reduce((a,t)=>a+t.result,0));
  document.getElementById('topList').innerHTML = r.slice(0,5).map((t,i)=>`<div class="rank" onclick="focusTeam('${encodeURIComponent(t.team)}')"><div class="medal">${['🥇','🥈','🥉','4','5'][i]}</div><div><strong>${t.team}</strong><small>👑 ${t.leader} · 실적 ${fmt(t.result)}</small></div><div class="pct">${t.rate.toFixed(1)}%</div></div>`).join('');
  const query = normalize(document.getElementById('q').value);
  let list = r.filter(t => !query || normalize(t.team).includes(query) || t.members.some(m=>normalize(m).includes(query)));
  if(filter==='top10') list = list.slice(0,10);
  if(filter==='risk') list = list.filter(t=>t.rate<10);
  if(filter==='done') list = list.filter(t=>t.rate>=100);
  const params = new URLSearchParams(location.search); const teamParam = params.get('team');
  const grid = document.getElementById('grid');
  grid.innerHTML = list.map(t=>card(t, rankMap.get(t.team), teamParam && normalize(teamParam)===normalize(t.team))).join('');
  document.querySelectorAll('.bar').forEach(el=>requestAnimationFrame(()=>el.style.width=el.dataset.w+'%'));
  document.getElementById('empty').style.display = list.length?'none':'block';
  if(teamParam) showMyTeam(teamParam, r.find(t=>normalize(t.team)===normalize(teamParam)));
}
function card(t, rank, hi){
  const rate = pct(t), capped = Math.min(rate,100), remain = Math.max(t.target-t.result,0);
  const members = t.members.filter(n=>n!==t.leader);
  return `<article class="card ${hi?'highlight':''}" id="team-${encodeURIComponent(t.team)}"><div class="cardhead"><div><div class="team">${t.team}</div><div class="leader">👑 팀장 ${t.leader}</div></div><div class="badge">#${rank}</div></div><div class="metrics"><div class="metric"><span>목표</span><b>${fmt(t.target)}</b></div><div class="metric"><span>실적</span><b>${fmt(t.result)}</b></div><div class="metric"><span>참가PSM</span><b>${fmt(t.members.length)}명</b></div></div><div class="gauge"><div class="circle" style="--p:${capped}"><i>${rate.toFixed(1)}%</i></div><div><b>달성률</b><div class="barwrap"><div class="bar" data-w="${capped}"></div></div><div class="remain">${remain?`목표까지 ${fmt(remain)} 남음`:'목표 달성 완료 🎉'}</div></div></div><button class="toggle" onclick="toggleMembers(this)">팀원 보기 ${members.length}명</button><div class="members">${members.map(m=>`<span class="person"><span class="avatar">${initials(m)}</span>${m}</span>`).join('')}</div></article>`
}
function toggleMembers(btn){ const m=btn.nextElementSibling; m.classList.toggle('open'); btn.textContent = m.classList.contains('open') ? '팀원 접기' : '팀원 보기 '+m.children.length+'명'; }
function toggleBox(btn){ const box=btn.parentElement; const content=btn.nextElementSibling; box.classList.toggle('collapsed'); btn.classList.toggle('collapsed'); content.style.display = content.style.display==='none' ? (content.className.includes('toplist')?'grid':'block') : 'none'; }
function go(id,btn){document.getElementById(id).scrollIntoView({behavior:'smooth',block:'start'}); document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); btn.classList.add('active')}
function focusTeam(name){ const id='team-'+name; const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }
function showMyTeam(param,t){ const box=document.getElementById('myTeamBox'); if(!t) return; box.style.display='block'; box.innerHTML=`<b>내 팀 바로가기</b><br>${t.team} · 현재 #${ranked().findIndex(x=>x.team===t.team)+1} · 달성률 ${pct(t).toFixed(1)}%`; }
document.getElementById('q').addEventListener('input', render);
document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active')); b.classList.add('active'); filter=b.dataset.filter; render();});
function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){const c=text[i], n=text[i+1]; if(c==='"'){ if(q&&n==='"'){cur+='"';i++} else q=!q } else if(c===','&&!q){row.push(cur);cur=''} else if((c==='
'||c==='
')&&!q){ if(cur||row.length){row.push(cur);rows.push(row);row=[];cur=''} if(c==='
'&&n==='
')i++; } else cur+=c; } if(cur||row.length){row.push(cur);rows.push(row)} return rows;
}

function parseNumber(v){ return Number((v||'0').toString().replace(/[^0-9.-]/g,'')) || 0; }
async function loadSheetData(){
  const msg = document.getElementById('syncMsg');
  try{
    const res = await fetch(GOOGLE_SHEET_CSV_URL + '&cacheBust=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('시트 응답 오류');
    const text = await res.text();
    const rows = parseCSV(text).filter(r => r.some(c => (c||'').trim()));
    const head = rows.shift().map(h => h.trim());
    const ti = head.findIndex(h => h === '팀명');
    const ta = head.findIndex(h => h.includes('목표'));
    const ri = head.findIndex(h => h.includes('실적'));
    if(ti < 0 || ta < 0 || ri < 0) throw new Error('팀명, 목표, 실적 컬럼을 찾지 못했습니다.');
    const map = new Map();
    rows.forEach(r => {
      const teamName = (r[ti] || '').trim();
      if(!teamName) return;
      map.set(normalize(teamName), { target: parseNumber(r[ta]), result: parseNumber(r[ri]) });
    });
    teams = BASE_TEAMS.map(t => map.has(normalize(t.team)) ? {...t, ...map.get(normalize(t.team))} : {...t});
    render();
    msg.textContent = `구글시트 연동 완료 · ${new Date().toLocaleString('ko-KR', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})} 기준`;
  }catch(err){
    console.error(err);
    render();
    msg.textContent = '구글시트를 불러오지 못했습니다. 공유 권한이 “링크가 있는 모든 사용자 - 뷰어”인지 확인해주세요.';
  }
}
loadSheetData();
setInterval(loadSheetData, 5 * 60 * 1000);
setTimeout(()=>{const p=new URLSearchParams(location.search).get('team'); if(p) focusTeam(encodeURIComponent(p));},500);
</script></body></html>
